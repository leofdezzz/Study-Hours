/* ═══════════════════════════════════════════════
   WIRE UP
═══════════════════════════════════════════════ */
function wireUp() {
  document.querySelectorAll('[data-sid]').forEach(el => {
    el.addEventListener('click', () => {
      if (timer.running) return;
      selectedSubject = el.dataset.sid;
      render();
    });
  });

  const chips = document.getElementById('chips');
  if (chips) {
    const update = () => {
      const el = document.getElementById('chips');
      const sec = el?.closest('.chips-section');
      if (!el || !sec) return;
      const overflows = el.scrollWidth > el.clientWidth + 1;
      const atStart = el.scrollLeft < 2;
      const atEnd = el.scrollLeft + el.clientWidth >= el.scrollWidth - 2;
      el.classList.toggle('fade-l', overflows && !atStart);
      el.classList.toggle('fade-r', overflows && !atEnd);
      sec.classList.toggle('more-right', overflows && !atEnd);
    };
    chips.addEventListener('scroll', update, { passive: true });

    // Vertical wheel → horizontal scroll
    chips.addEventListener('wheel', e => {
      if (chips.scrollWidth <= chips.clientWidth) return;
      if (Math.abs(e.deltaY) <= Math.abs(e.deltaX)) return;
      e.preventDefault();
      chips.scrollLeft += e.deltaY;
    }, { passive: false });

    // Mouse drag-to-scroll
    let dragging = false, startX = 0, startScroll = 0, moved = 0;
    chips.addEventListener('pointerdown', e => {
      if (e.pointerType !== 'mouse') return;
      dragging = true; moved = 0;
      startX = e.clientX;
      startScroll = chips.scrollLeft;
      chips.classList.add('dragging');
    });
    chips.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      moved = Math.max(moved, Math.abs(dx));
      chips.scrollLeft = startScroll - dx;
    });
    const endDrag = () => {
      if (!dragging) return;
      dragging = false;
      chips.classList.remove('dragging');
      // Suppress the click if the user actually dragged
      if (moved > 4) {
        const block = e => { e.stopPropagation(); e.preventDefault(); };
        chips.addEventListener('click', block, { once: true, capture: true });
        setTimeout(() => chips.removeEventListener('click', block, { capture: true }), 0);
      }
    };
    chips.addEventListener('pointerup', endDrag);
    chips.addEventListener('pointercancel', endDrag);
    chips.addEventListener('pointerleave', endDrag);

    if (!window.__chipsResize) {
      window.__chipsResize = update;
      window.addEventListener('resize', () => window.__chipsResize?.());
    } else {
      window.__chipsResize = update;
    }
    requestAnimationFrame(update);
  }
}

function shiftWeek(dir) {
  const next = weekOffset + dir;
  if (next > 0) return;
  weekOffset = next;
  render();
}

/* ═══════════════════════════════════════════════
   SHEET: add/edit subject
═══════════════════════════════════════════════ */
let sheetSelColor = COLORS[0];
let sheetEditId = null;

function openAddSubject() {
  sheetEditId = null;
  sheetSelColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  showSheet(`
    <div class="sheet-grip"></div>
    <h2 class="sheet-title">Nueva <span class="serif">asignatura</span></h2>
    <div class="field-lbl">Nombre</div>
    <input type="text" class="text-input" id="sh-name" placeholder="p. ej. Cálculo II" maxlength="40" autocomplete="off">
    <div class="field-lbl">Color</div>
    <div class="swatches" id="sh-swatches"></div>
    <div class="sheet-acts">
      <button class="s-btn ghost" onclick="hideSheet()">Cancelar</button>
      <button class="s-btn primary" onclick="saveSubject()">Guardar</button>
    </div>
  `);
  renderSwatches();
  setTimeout(() => document.getElementById('sh-name').focus(), 300);
}

function openEditSubject(id) {
  const s = data.subjects.find(s => s.id === id);
  if (!s) return;
  sheetEditId = id;
  sheetSelColor = s.color;
  showSheet(`
    <div class="sheet-grip"></div>
    <h2 class="sheet-title">Editar <span class="serif">asignatura</span></h2>
    <div class="field-lbl">Nombre</div>
    <input type="text" class="text-input" id="sh-name" value="${esc(s.name)}" maxlength="40" autocomplete="off">
    <div class="field-lbl">Color</div>
    <div class="swatches" id="sh-swatches"></div>
    <div class="sheet-acts">
      <button class="s-btn danger" onclick="deleteSubject()">Eliminar</button>
      <button class="s-btn primary" onclick="saveSubject()">Guardar</button>
    </div>
  `);
  renderSwatches();
  setTimeout(() => document.getElementById('sh-name').focus(), 300);
}

function openGoal() {
  showSheet(`
    <div class="sheet-grip"></div>
    <h2 class="sheet-title">Meta <span class="serif">diaria</span></h2>
    <div class="field-lbl">Horas por día</div>
    <input type="number" class="text-input" id="sh-goal" min="0" max="24" step="0.5" placeholder="p. ej. 4" value="${settings.dailyGoal || ''}">
    <div style="font-size:12px;color:var(--t3);margin-bottom:20px;">Pon 0 para quitar la meta.</div>
    <div class="sheet-acts">
      <button class="s-btn ghost" onclick="hideSheet()">Cancelar</button>
      <button class="s-btn primary" onclick="saveGoal()">Guardar</button>
    </div>
  `);
  setTimeout(() => document.getElementById('sh-goal').focus(), 300);
}

function saveGoal() {
  const v = parseFloat(document.getElementById('sh-goal').value) || 0;
  const goal = Math.max(0, Math.min(24, v));
  saveSettings({ dailyGoal: goal });
  hideSheet();
  render();
  toast(goal > 0 ? `Meta: ${fmtStr(goal)} al día` : 'Meta eliminada');
}

function renderSwatches() {
  const row = document.getElementById('sh-swatches');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'sw-pick' + (c === sheetSelColor ? ' selected' : '');
    b.style.setProperty('--_c', c);
    b.onclick = () => {
      sheetSelColor = c;
      row.querySelectorAll('.sw-pick').forEach(s => s.classList.remove('selected'));
      b.classList.add('selected');
    };
    row.appendChild(b);
  });
}

function saveSubject() {
  const name = document.getElementById('sh-name').value.trim();
  if (!name) return;
  if (sheetEditId) {
    const s = data.subjects.find(s => s.id === sheetEditId);
    s.name = name;
    s.color = sheetSelColor;
    toast('Asignatura actualizada');
  } else {
    const id = `s${Date.now()}`;
    data.subjects.push({ id, name, color: sheetSelColor });
    if (!selectedSubject) selectedSubject = id;
    toast('Asignatura creada');
  }
  saveStore();
  hideSheet();
  render();
}

function deleteSubject() {
  if (!confirm('¿Eliminar esta asignatura y todos sus registros?')) return;
  data.subjects = data.subjects.filter(s => s.id !== sheetEditId);
  Object.keys(data.logs).forEach(k => {
    delete data.logs[k][sheetEditId];
    if (!Object.keys(data.logs[k]).length) delete data.logs[k];
  });
  if (selectedSubject === sheetEditId) selectedSubject = data.subjects[0]?.id || null;
  saveStore();
  hideSheet();
  render();
  toast('Eliminada');
}

function showSheet(html) {
  const el = document.getElementById('sheet');
  el.innerHTML = html;
  document.getElementById('sheet-overlay').classList.add('open');
}
function hideSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
}
document.getElementById('sheet-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('sheet-overlay')) hideSheet();
});

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  clearTimeout(toastT);
  el.textContent = msg;
  el.classList.add('show');
  toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════════
   TICK (update clock every 500ms while running)
═══════════════════════════════════════════════ */
setInterval(() => {
  if (timer.running) {
    const clockEl = document.querySelector('.clock');
    if (!clockEl) return;
    const ms = currentElapsedMs();
    const totalSec = Math.floor(ms / 1000);
    const hours = Math.floor(totalSec / 3600);
    const mins = Math.floor((totalSec % 3600) / 60);
    const secs = totalSec % 60;
    const pad = (n) => String(n).padStart(2, '0');
    if (hours > 0) {
      clockEl.innerHTML = `<span>${pad(hours)}</span><span class="sep">:</span><span>${pad(mins)}</span>` +
        (tweaks.showSeconds ? `<span class="sec">${pad(secs)}</span>` : '');
    } else {
      clockEl.innerHTML = `<span>${pad(mins)}</span><span class="sep">:</span><span>${pad(secs)}</span>`;
    }
  }
}, 500);

/* Keyboard: space toggles start/pause, Esc hides sheet */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideSheet();
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    if (timer.running) pauseTimer();
    else if (timer.elapsed > 0) resumeTimer();
    else startTimer();
  }
});

/* ═══════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════ */
let authMode = 'login'; // 'login' | 'register'

function showAuth() {
  document.getElementById('auth-overlay').classList.add('open');
  document.getElementById('root').style.display = 'none';
  renderAuth();
  setTimeout(() => document.getElementById('au-user')?.focus(), 200);
}
function hideAuth() {
  document.getElementById('auth-overlay').classList.remove('open');
  document.getElementById('root').style.display = '';
}

function renderAuth() {
  const el = document.getElementById('auth-box');
  el.innerHTML = `
    <div class="mark" style="font-size:10px;text-transform:uppercase;letter-spacing:0.22em;color:var(--t3);font-weight:600;margin-bottom:8px;text-align:center;">Study Hours · 2026</div>
    <h1 class="serif" style="font-size:44px;line-height:1;margin-bottom:6px;text-align:center;letter-spacing:-0.02em;">
      ${authMode === 'login' ? 'Bienvenido' : 'Crear cuenta'}
    </h1>
    <div style="text-align:center;color:var(--t2);font-size:14px;margin-bottom:32px;">
      ${authMode === 'login' ? 'Entra para seguir midiendo' : 'Empieza a medir tus horas de estudio'}
    </div>
    <div class="field-lbl">Usuario</div>
    <input type="text" class="text-input" id="au-user" placeholder="tu nombre" autocomplete="username" maxlength="24">
    <div class="field-lbl">Contraseña</div>
    <input type="password" class="text-input" id="au-pass" placeholder="••••••••" autocomplete="${authMode === 'login' ? 'current-password' : 'new-password'}">
    <div id="au-err" style="font-size:12px;color:var(--bad);margin-top:-12px;margin-bottom:12px;min-height:16px;"></div>
    <button class="s-btn primary" style="width:100%;justify-content:center;height:48px;font-size:14px;" id="au-submit" onclick="doAuth()">
      ${authMode === 'login' ? 'Entrar' : 'Crear cuenta'}
    </button>
    <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--t3);">
      ${authMode === 'login' ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?'}
      <button onclick="toggleAuthMode()" style="color:var(--accent);font-weight:600;margin-left:6px;">
        ${authMode === 'login' ? 'Crear una' : 'Entrar'}
      </button>
    </div>
  `;
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  renderAuth();
  setTimeout(() => document.getElementById('au-user').focus(), 50);
}

async function doAuth() {
  const u = document.getElementById('au-user').value.trim();
  const p = document.getElementById('au-pass').value;
  const err = document.getElementById('au-err');
  const btn = document.getElementById('au-submit');
  err.textContent = '';
  if (!u || !p) { err.textContent = 'Introduce usuario y contraseña'; return; }
  btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(`/api/auth/${authMode}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const json = await res.json();
    if (!res.ok) {
      err.textContent = json.error || 'Error';
      btn.disabled = false;
      btn.textContent = authMode === 'login' ? 'Entrar' : 'Crear cuenta';
      return;
    }
    setToken(json.token);
    currentUser = json.username;
    hideAuth();
    await boot();
  } catch {
    err.textContent = 'Error de conexión';
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Entrar' : 'Crear cuenta';
  }
}

function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  stopStudyHeartbeat();
  pushStudyStatus(false);
  clearToken();
  currentUser = null;
  data = { subjects: [], logs: {} };
  settings = { dailyGoal: 0 };
  groups = [];
  boards = {};
  activeGroupId = null;
  stopGroupsPoll();
  showAuth();
}

/* ═══════════════════════════════════════════════
   PUSH NOTIFICATIONS
═══════════════════════════════════════════════ */
function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function initPush() {
  if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (Notification.permission === 'denied') return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    pushEnabled = !!sub;
  } catch {}
}

async function togglePush() {
  if (!('Notification' in window)) return;
  if (pushEnabled) {
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) await sub.unsubscribe();
      await apiFetch('/api/push/subscribe', { method: 'DELETE' });
      pushEnabled = false;
      render();
      toast('Notificaciones desactivadas');
    } catch { toast('Error al desactivar'); }
  } else {
    try {
      if (Notification.permission !== 'granted') {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { toast('Permiso denegado'); return; }
      }
      const keyRes = await apiFetch('/api/push/key');
      if (!keyRes.ok) { toast('Push no disponible'); return; }
      const { publicKey } = await keyRes.json();
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });
      await apiFetch('/api/push/subscribe', { method: 'POST', body: JSON.stringify({ subscription: sub }) });
      pushEnabled = true;
      render();
      toast('🔔 Notificaciones activadas');
    } catch (e) {
      console.error(e);
      toast('Error al activar notificaciones');
    }
  }
}

/* Service worker */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
applyTweaks();

async function boot() {
  const token = getToken();
  if (!token) { showAuth(); return; }
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    currentUser = payload.username;
  } catch {
    clearToken();
    showAuth();
    return;
  }
  await Promise.all([loadStore(), loadSettings()]);
  await initPush();

  // Ensure selected subject is valid
  if (!data.subjects.find(s => s.id === selectedSubject)) {
    selectedSubject = data.subjects[0]?.id || null;
  }
  // Restore timer subject reference if the subject still exists
  if (timer.subjectId && !data.subjects.find(s => s.id === timer.subjectId)) {
    timer = { running: false, startedAt: null, elapsed: 0, subjectId: null };
    saveTimerState();
  }

  // Resume the study-status heartbeat if the timer was running on last page load
  if (timer.running) startStudyHeartbeat();

  hideAuth();
  render();

  await loadGroups();
  render();
  startGroupsPoll();
}

boot();
</script>
