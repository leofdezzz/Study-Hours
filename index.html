<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0c0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Study Hours">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>Study Hours</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #0c0c0c;
      --s1:     #141414;
      --s2:     #1c1c1c;
      --s3:     #252525;
      --border: #2a2a2a;
      --text:   #ffffff;
      --t2:     #999999;
      --t3:     #4a4a4a;
      --green:  #86efac;
      --red:    #fca5a5;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { display: none; }

    /* ─── Layout ─── */
    .wrap { max-width: 460px; margin: 0 auto; padding: 0 18px; }

    /* ─── Header ─── */
    .hdr { padding: 52px 18px 28px; max-width: 460px; margin: 0 auto; }
    .hdr-sub {
      font-size: 11px; font-weight: 500; color: var(--t3);
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px;
    }
    .hdr-title { font-size: 30px; font-weight: 800; letter-spacing: -1.2px; }
    .hdr-date  { font-size: 13px; color: var(--t2); margin-top: 5px; }
    .hdr-user  {
      display: none; align-items: center; gap: 8px; margin-top: 8px;
    }
    .hdr-username { font-size: 12px; color: var(--t3); }
    .logout-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--t3); font-size: 11px; font-weight: 600; padding: 3px 10px;
      cursor: pointer; transition: color .15s, border-color .15s; font-family: inherit;
    }
    .logout-btn:hover { color: var(--t2); border-color: #383838; }

    /* ─── Stats Row ─── */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .stat-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 20px; padding: 18px 16px;
      position: relative; overflow: hidden; transition: border-color .2s;
    }
    .stat-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,.025) 0%, transparent 55%);
      pointer-events: none;
    }
    .stat-lbl {
      font-size: 10px; font-weight: 600; color: var(--t3);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }
    .stat-val {
      font-size: 32px; font-weight: 800;
      letter-spacing: -2px; line-height: 1; margin-bottom: 9px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; letter-spacing: .2px;
    }
    .badge.pos { color: var(--green); background: rgba(134,239,172,.1); }
    .badge.neg { color: var(--red);   background: rgba(252,165,165,.1); }
    .badge.neu { color: var(--t3);    background: var(--s2); }

    /* ─── Streak Card ─── */
    .streak-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 16px; padding: 13px 18px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .streak-left { display: flex; align-items: center; gap: 10px; }
    .streak-icon { font-size: 18px; line-height: 1; }
    .streak-lbl  { font-size: 12px; font-weight: 600; color: var(--t2); }
    .streak-sub  { font-size: 11px; color: var(--t3); margin-top: 1px; }
    .streak-val  { font-size: 26px; font-weight: 800; letter-spacing: -1.5px; }

    /* ─── Chart ─── */
    .chart-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px 18px 18px; margin-bottom: 12px;
    }
    .card-head {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 18px;
    }
    .card-title {
      font-size: 10px; font-weight: 600; color: var(--t3);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .week-nav { display: flex; align-items: center; gap: 6px; }
    .week-nav-btn {
      width: 22px; height: 22px; border-radius: 7px;
      background: var(--s2); border: 1px solid var(--border);
      color: var(--t2); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s; font-family: inherit;
      padding: 0;
    }
    .week-nav-btn:hover { background: var(--s3); color: var(--text); }
    .week-nav-btn:disabled { opacity: .3; cursor: default; }
    .week-label { font-size: 12px; color: var(--t3); min-width: 80px; text-align: center; }
    .chart-area { height: 90px; display: flex; align-items: flex-end; gap: 6px; }
    .bar-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; height: 100%; gap: 7px;
    }
    .bar {
      width: 100%; border-radius: 5px 5px 3px 3px; background: var(--s3);
      transition: height .65s cubic-bezier(.34,1.4,.64,1); position: relative;
    }
    .bar.active { background: #fff; box-shadow: 0 0 14px rgba(255,255,255,.2); }
    .bar-lbl { font-size: 10px; font-weight: 500; color: var(--t3); transition: color .2s; }
    .bar-lbl.active { color: var(--text); }

    /* ─── Subjects ─── */
    .sec-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .add-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fff; color: #000; border: none; border-radius: 12px;
      padding: 8px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: -.2px;
      transition: opacity .15s, transform .1s; font-family: inherit;
    }
    .add-btn:active { transform: scale(.95); }

    .subjects { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

    .sc {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 20px; padding: 15px 16px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color .2s; position: relative; overflow: hidden;
      animation: si .35s cubic-bezier(.34,1.4,.64,1) both;
    }
    .sc:hover { border-color: #383838; }
    @keyframes si {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sc-info { flex: 1; min-width: 0; }
    .sc-name {
      font-size: 15px; font-weight: 600; letter-spacing: -.3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sc-week { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .sc-today {
      font-size: 22px; font-weight: 800; letter-spacing: -1.5px;
      min-width: 50px; text-align: center;
    }
    .sc-today.pop { animation: pop .3s cubic-bezier(.34,1.9,.64,1); }
    @keyframes pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.28); }
      100% { transform: scale(1); }
    }

    .sc-ctrl { display: flex; gap: 5px; }
    .hbtn {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--s2); border: 1px solid var(--border);
      color: var(--text); font-size: 16px; font-weight: 400;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
      position: relative; overflow: hidden;
      user-select: none; -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .hbtn:hover { background: var(--s3); }
    .hbtn:active { transform: scale(.87); }
    .hbtn.pomo { font-size: 17px; }
    .hbtn.hr   { font-size: 11px; font-weight: 700; color: var(--t2); letter-spacing: -.3px; }

    .sc-edit {
      opacity: 0; width: 28px; height: 28px; border-radius: 8px;
      background: transparent; border: none; color: var(--t3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, color .15s; flex-shrink: 0;
    }
    .sc:hover .sc-edit { opacity: 1; }
    .sc-edit:hover { color: var(--t2); }

    /* Floating label */
    .float-lbl {
      position: absolute; right: 68px; font-size: 12px; font-weight: 700;
      pointer-events: none; opacity: 0; transform: translateY(0);
      animation: floatUp .7s cubic-bezier(.25,.46,.45,.94) forwards;
    }
    .float-lbl.pos { color: var(--green); }
    .float-lbl.neg { color: var(--red); }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0px); }
      70%  { opacity: .7; }
      100% { opacity: 0; transform: translateY(-28px); }
    }

    /* ─── Total ─── */
    .total-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .total-info .lbl { font-size: 13px; font-weight: 500; color: var(--t2); }
    .total-info .sub { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .total-val { font-size: 38px; font-weight: 800; letter-spacing: -2.5px; }

    /* ─── Empty ─── */
    .empty { text-align: center; padding: 36px 16px; }
    .empty-icon { font-size: 30px; opacity: .25; margin-bottom: 10px; }
    .empty-txt  { font-size: 13px; color: var(--t3); line-height: 1.6; }

    /* ─── Modal / Sheet ─── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.78);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .25s; display: flex; align-items: flex-end;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      width: 100%; max-width: 460px; margin: 0 auto;
      background: var(--s1); border: 1px solid var(--border);
      border-bottom: none; border-radius: 24px 24px 0 0;
      padding: 12px 22px 52px;
      transform: translateY(105%);
      transition: transform .42s cubic-bezier(.34,1.1,.64,1);
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--s3);
      border-radius: 2px; margin: 8px auto 26px;
    }
    .sheet-title {
      font-size: 20px; font-weight: 800;
      letter-spacing: -.6px; margin-bottom: 20px;
    }
    .txt-input {
      width: 100%; background: var(--s2); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 14px 16px; color: var(--text);
      font-size: 15px; font-weight: 500; outline: none;
      transition: border-color .2s; letter-spacing: -.2px; margin-bottom: 16px;
      font-family: inherit;
    }
    .txt-input::placeholder { color: var(--t3); }
    .txt-input:focus { border-color: #555; }

    /* Color picker */
    .color-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform .15s, border-color .15s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #fff; transform: scale(1.15); }

    .sheet-acts { display: flex; gap: 10px; }
    .sbtn {
      flex: 1; padding: 14px; border-radius: 14px; font-size: 15px;
      font-weight: 700; cursor: pointer; border: 1.5px solid transparent;
      letter-spacing: -.3px; transition: opacity .15s, transform .1s;
      font-family: inherit;
    }
    .sbtn:active { transform: scale(.97); }
    .sbtn.primary   { background: #fff; color: #000; }
    .sbtn.secondary { background: transparent; color: var(--t2); border-color: var(--border); }
    .sbtn.danger    { background: transparent; color: var(--red); border-color: rgba(252,165,165,.2); }

    /* ─── Ripple ─── */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.18); transform: scale(0);
      animation: rpl .5s linear forwards; pointer-events: none;
    }
    @keyframes rpl { to { transform: scale(5); opacity: 0; } }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #fff; color: #000; font-size: 13px; font-weight: 700;
      padding: 10px 20px; border-radius: 100px; opacity: 0;
      transition: transform .3s cubic-bezier(.34,1.4,.64,1), opacity .3s;
      z-index: 300; pointer-events: none; white-space: nowrap; letter-spacing: -.2px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── Auth Screen ─── */
    .auth-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 500;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 24px; transition: opacity .3s;
    }
    .auth-screen.hidden { opacity: 0; pointer-events: none; }
    .auth-card {
      width: 100%; max-width: 360px; background: var(--s1);
      border: 1px solid var(--border); border-radius: 24px; padding: 28px 24px 32px;
    }
    .auth-logo    { font-size: 22px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
    .auth-tagline { font-size: 13px; color: var(--t2); margin-bottom: 26px; }
    .auth-tabs {
      display: flex; background: var(--s2); border-radius: 12px;
      padding: 3px; margin-bottom: 20px; gap: 3px;
    }
    .auth-tab {
      flex: 1; padding: 8px; border-radius: 9px; border: none;
      background: transparent; color: var(--t3); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s, color .15s; font-family: inherit;
    }
    .auth-tab.active { background: var(--s3); color: var(--text); }
    .auth-error {
      font-size: 12px; color: var(--red); background: rgba(252,165,165,.1);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
      display: none; line-height: 1.4;
    }
    .auth-error.show { display: block; }
    .auth-btn {
      width: 100%; padding: 14px; border-radius: 14px;
      background: #fff; color: #000; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: -.3px; transition: opacity .15s, transform .1s;
      margin-top: 4px; font-family: inherit;
    }
    .auth-btn:active  { transform: scale(.98); }
    .auth-btn:disabled { opacity: .5; cursor: default; transform: none; }

    /* ─── Groups ─── */
    .groups-wrap { padding-bottom: 48px; }
    .grp-action-btn {
      padding: 7px 13px; border-radius: 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; border: 1px solid var(--border);
      background: var(--s2); color: var(--t2);
      transition: background .15s, color .15s;
    }
    .grp-action-btn:hover { background: var(--s3); color: var(--text); }
    .grp-action-btn.primary { background: var(--text); color: var(--bg); border-color: transparent; }
    .grp-action-btn.primary:hover { opacity: .85; }

    .group-row {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 4px; border-bottom: 1px solid var(--border);
      animation: si .3s cubic-bezier(.34,1.4,.64,1) both;
    }
    .group-row:last-child { border-bottom: none; }
    .group-row-info { flex: 1; min-width: 0; }
    .group-row-name {
      font-size: 14px; font-weight: 600; letter-spacing: -.3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .group-row-meta { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .group-row-code {
      font-size: 10px; font-family: monospace; letter-spacing: 1.5px;
      color: var(--t3); background: var(--s2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px; cursor: pointer; flex-shrink: 0;
      transition: color .15s; white-space: nowrap;
    }
    .group-row-code:hover { color: var(--t2); }
    .group-row-ranking {
      font-size: 12px; font-weight: 600; color: var(--t2); flex-shrink: 0;
      background: none; border: none; cursor: pointer; font-family: inherit;
      padding: 4px 2px; transition: color .15s;
    }
    .group-row-ranking:hover { color: var(--text); }
    .group-row-leave {
      background: none; border: none; color: var(--t3); font-size: 16px;
      cursor: pointer; padding: 2px; border-radius: 6px; line-height: 1;
      flex-shrink: 0; transition: color .15s; font-family: inherit;
    }
    .group-row-leave:hover { color: var(--red); }
    .groups-empty { font-size: 13px; color: var(--t3); padding: 16px 4px; line-height: 1.6; }

    /* ─── Leaderboard overlay ─── */
    .lb-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.88);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 400; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .lb-overlay.open { opacity: 1; pointer-events: all; }
    .lb-modal {
      width: 100%; max-width: 440px; background: var(--s1);
      border: 1px solid var(--border); border-radius: 24px;
      max-height: 88vh; overflow: hidden; display: flex; flex-direction: column;
      transform: scale(.95) translateY(12px);
      transition: transform .35s cubic-bezier(.34,1.2,.64,1);
    }
    .lb-overlay.open .lb-modal { transform: scale(1) translateY(0); }
    .lb-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 22px 22px 0; flex-shrink: 0;
    }
    .lb-group-name { font-size: 20px; font-weight: 800; letter-spacing: -.6px; }
    .lb-code-btn {
      margin-top: 6px; font-size: 11px; font-weight: 600; font-family: monospace;
      letter-spacing: 1.5px; color: var(--t3); background: var(--s2);
      border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px;
      cursor: pointer; transition: color .15s;
    }
    .lb-code-btn:hover { color: var(--t2); }
    .lb-close {
      background: var(--s2); border: 1px solid var(--border); border-radius: 10px;
      color: var(--t2); font-size: 18px; width: 36px; height: 36px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: inherit; transition: color .15s; flex-shrink: 0;
    }
    .lb-close:hover { color: var(--text); }
    .lb-tabs {
      display: flex; gap: 4px; padding: 14px 22px 0; flex-shrink: 0;
    }
    .lb-tab {
      flex: 1; padding: 7px 0; border-radius: 10px; border: none;
      background: transparent; color: var(--t3); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .15s, color .15s;
    }
    .lb-tab.active { background: var(--s3); color: var(--text); }
    .lb-board { padding: 10px 14px 22px; overflow-y: auto; flex: 1; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 10px; border-radius: 14px;
    }
    .lb-row.me { background: var(--s2); }
    .lb-rank { font-size: 18px; min-width: 30px; text-align: center; }
    .lb-rank.num { font-size: 13px; font-weight: 700; color: var(--t3); }
    .lb-user { flex: 1; min-width: 0; }
    .lb-username {
      font-size: 14px; font-weight: 600; letter-spacing: -.2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lb-you { font-size: 10px; color: var(--t3); margin-top: 1px; font-weight: 500; }
    .lb-stats { text-align: right; flex-shrink: 0; }
    .lb-hrs { font-size: 20px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .lb-diff { font-size: 11px; font-weight: 600; margin-top: 3px; }
    .lb-diff.leader { color: var(--green); }
    .lb-diff.behind { color: var(--red); }
    .lb-empty { text-align: center; padding: 32px 16px; font-size: 13px; color: var(--t3); }

    /* ─── Per-subject leaderboard ─── */
    .lb-subj-section { margin-bottom: 14px; }
    .lb-subj-title {
      font-size: 10px; font-weight: 600; color: var(--t3);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 10px 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .lb-subj-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 10px;
    }
    .lb-subj-row.me { background: var(--s2); }
    .lb-subj-rank { font-size: 15px; min-width: 26px; text-align: center; }
    .lb-subj-rank.num { font-size: 12px; font-weight: 700; color: var(--t3); }
    .lb-subj-user {
      flex: 1; font-size: 13px; font-weight: 500; color: var(--t2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lb-subj-user.me { color: var(--text); font-weight: 600; }
    .lb-subj-hrs { font-size: 14px; font-weight: 700; letter-spacing: -.5px; flex-shrink: 0; }

    /* ─── Responsive ─── */
    @media (max-width: 380px) {
      .hdr { padding: 36px 16px 22px; }
      .wrap { padding: 0 14px; }
      .hdr-title { font-size: 26px; }
      .stat-val { font-size: 26px; }
      .total-val { font-size: 32px; }
      .sc-today { font-size: 18px; min-width: 42px; }
      .sc-name  { font-size: 14px; }
      .hbtn { width: 30px; height: 30px; font-size: 14px; }

  </style>
</head>

<script>
/* ═══════════════════════════════════
   Constants
═══════════════════════════════════ */
const COLORS      = ['#a78bfa','#60a5fa','#34d399','#fbbf24','#f87171','#f472b6','#22d3ee','#fb923c'];
const POMO        = 25 / 60; // 0.4166... hours
const VALID_EMOJIS = ['🔥','💀','😤','👑'];

/* ═══════════════════════════════════
   Auth
═══════════════════════════════════ */
let currentUser = null;
let authMode    = 'login';

function getToken()  { return localStorage.getItem('sh_token'); }
function setToken(t) { localStorage.setItem('sh_token', t); }
function clearToken(){ localStorage.removeItem('sh_token'); }

function showAuth() {
  const el = document.getElementById('J_auth');
  el.style.display = '';
  el.classList.remove('hidden');
}
function hideAuth() { document.getElementById('J_auth').classList.add('hidden'); }

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('J_tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('J_tabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('J_authSubmit').textContent = mode === 'login' ? 'Entrar' : 'Crear cuenta';
  document.getElementById('J_authPass').autocomplete  = mode === 'login' ? 'current-password' : 'new-password';
  document.getElementById('J_authError').classList.remove('show');
}

async function doAuth() {
  const username = document.getElementById('J_authUser').value.trim();
  const password = document.getElementById('J_authPass').value;
  const errEl    = document.getElementById('J_authError');
  const btn      = document.getElementById('J_authSubmit');

  errEl.classList.remove('show');
  if (!username || !password) {
    errEl.textContent = 'Completa todos los campos';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = '...';

  try {
    const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const json = await res.json();

    if (!res.ok) {
      errEl.textContent = json.error || 'Error desconocido';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = authMode === 'login' ? 'Entrar' : 'Crear cuenta';
      return;
    }

    setToken(json.token);
    currentUser = json.username;
    await loadData();
    hideAuth();
    render();

  } catch {
    errEl.textContent = 'Error de conexión con el servidor';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Entrar' : 'Crear cuenta';
  }
}

function logout() {
  clearToken();
  currentUser = null;
  data       = { subjects: [], logs: {} };
  settings   = {};
  pushEnabled = false;
  weekOffset = 0;
  const userEl = document.getElementById('J_userInfo');
  userEl.style.display = 'none';
  userEl.innerHTML = '';
  showAuth();
}

document.getElementById('J_authUser').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('J_authPass').focus();
});
document.getElementById('J_authPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doAuth();
});

/* ═══════════════════════════════════
   Data layer
═══════════════════════════════════ */
let data       = { subjects: [], logs: {} };
let settings   = {};
let pushEnabled = false;
let editId     = null;
let weekOffset = 0;

async function apiFetch(path, opts = {}) {
  const token = getToken();
  const config = {
    method: opts.method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {})
    }
  };
  if (opts.body) config.body = opts.body;
  const res = await fetch(path, config);
  if (res.status === 401) { clearToken(); showAuth(); throw new Error('No autorizado'); }
  return res;
}

async function loadData() {
  const res = await apiFetch('/api/data');
  if (res.ok) data = await res.json();
}

function persist() {
  apiFetch('/api/data', {
    method: 'PUT',
    body: JSON.stringify(data)
  }).catch(() => {});
}

/* ═══════════════════════════════════
   Date helpers
═══════════════════════════════════ */
function dk(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function today() { return dk(new Date()); }

function weekOf(off = weekOffset) {
  const t = new Date(), dow = (t.getDay()+6)%7;
  const mon = new Date(t);
  mon.setDate(t.getDate() - dow + off * 7);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function daySum(key) {
  const d = data.logs[key];
  return d ? Object.values(d).reduce((s,v) => s+v, 0) : 0;
}
function weekSum(off = weekOffset) { return weekOf(off).reduce((s,d) => s + daySum(dk(d)), 0); }
function subDay(sid)  { return (data.logs[today()]||{})[sid]||0; }
function subWeek(sid) { return weekOf(weekOffset).reduce((s,d) => s+((data.logs[dk(d)]||{})[sid]||0), 0); }
function subAll(sid)  { return Object.values(data.logs).reduce((s,d) => s+(d[sid]||0), 0); }
function grandTotal() { return data.subjects.reduce((s,sub) => s + subAll(sub.id), 0); }

function calcStreak() {
  const d = new Date();
  let streak = 0;
  if (daySum(dk(d)) === 0) d.setDate(d.getDate() - 1);
  while (daySum(dk(d)) > 0) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function bestStreak() {
  const dates = Object.keys(data.logs)
    .filter(k => daySum(k) > 0)
    .sort();
  if (!dates.length) return 0;
  let best = 1, cur = 1;
  for (let i = 1; i < dates.length; i++) {
    const diff = (new Date(dates[i]) - new Date(dates[i-1])) / 86400000;
    if (diff === 1) { cur++; if (cur > best) best = cur; }
    else cur = 1;
  }
  return best;
}

/* ═══════════════════════════════════
   Week navigation
═══════════════════════════════════ */
function shiftWeek(dir) {
  const next = weekOffset + dir;
  if (next > 0) return;
  weekOffset = next;
  document.getElementById('J_nextWeek').disabled = (weekOffset === 0);
  render();
}

/* ═══════════════════════════════════
   Hour management
═══════════════════════════════════ */
function adjust(sid, delta) {
  const k = today();
  if (!data.logs[k]) data.logs[k] = {};
  const next = Math.max(0, +((data.logs[k][sid]||0) + delta).toFixed(4));
  if (next === 0) delete data.logs[k][sid];
  else data.logs[k][sid] = next;
  if (!Object.keys(data.logs[k]).length) delete data.logs[k];
  persist();
}

/* ═══════════════════════════════════
   Formatting
═══════════════════════════════════ */
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const exam = new Date(dateStr + 'T00:00:00');
  return Math.ceil((exam - now) / 86400000);
}

function examBadgeHtml(examDate) {
  const d = daysUntil(examDate);
  if (d === null || d < 0) return '';
  if (d === 0) return `<div class="exam-badge urgent">📅 Examen hoy</div>`;
  if (d === 1) return `<div class="exam-badge urgent">📅 Examen mañana</div>`;
  if (d <= 7)  return `<div class="exam-badge urgent">📅 ${d} días para el examen</div>`;
  return `<div class="exam-badge normal">📅 ${d} días para el examen</div>`;
}

function fmt(h) {
  if (h === 0) return '0h';
  const hr = Math.floor(h), mn = Math.round((h - hr) * 60);
  if (mn === 60) return `${hr+1}h`;
  if (hr === 0)  return `${mn}m`;
  if (mn === 0)  return `${hr}h`;
  return `${hr}h ${mn}m`;
}

function pct(now, prev) {
  if (now===0 && prev===0) return { txt:'Sin cambios', cls:'neu' };
  if (prev===0)            return { txt:`+${fmt(now)} nuevo`, cls:'pos' };
  const p = Math.round((now - prev) / prev * 100);
  return { txt:`${p>=0?'+':''}${p}%`, cls: p>0?'pos':p<0?'neg':'neu' };
}

/* ═══════════════════════════════════
   Render
═══════════════════════════════════ */
function render() {
  renderHeader();
  renderStats();
  renderGoalBar();
  renderStreak();
  renderChart();
  renderSubjects();
  renderTotal();
}

function renderHeader() {
  const D = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const M = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const n = new Date();
  document.getElementById('J_date').textContent = `${D[n.getDay()]}, ${n.getDate()} de ${M[n.getMonth()]}`;

  const userEl = document.getElementById('J_userInfo');
  if (currentUser) {
    const pushSupported = ('Notification' in window) && ('serviceWorker' in navigator) && ('PushManager' in window);
    const pushHtml = pushSupported
      ? `<button class="hdr-icon-btn${pushEnabled ? ' on' : ''}" id="J_pushBtn" onclick="togglePush()" title="${pushEnabled ? 'Desactivar notificaciones' : 'Activar notificaciones'}">${pushEnabled ? '🔔' : '🔕'}</button>`
      : '';
    userEl.innerHTML = `
      <span class="hdr-username">${esc(currentUser)}</span>
      <button class="hdr-icon-btn" onclick="openGoalSheet()" title="Meta diaria">⚙</button>
      ${pushHtml}
      <button class="logout-btn" onclick="logout()">Salir</button>`;
    userEl.style.display = 'flex';
  }
}

function renderStats() {
  const tod  = daySum(today());
  const yest = daySum(dk(new Date(Date.now()-86400000)));
  const wk   = weekSum(weekOffset);
  const lwk  = weekSum(weekOffset - 1);

  document.getElementById('J_todayVal').textContent = fmt(tod);
  document.getElementById('J_weekVal').textContent  = fmt(wk);

  const tc = pct(tod, yest), wc = pct(wk, lwk);
  const tb = document.getElementById('J_todayBadge');
  tb.textContent = `${tc.txt} vs ayer`;
  tb.className = `badge ${tc.cls}`;

  const wb = document.getElementById('J_weekBadge');
  wb.textContent = weekOffset === 0
    ? `${wc.txt} vs sem. ant.`
    : `${wc.txt} vs anterior`;
  wb.className = `badge ${wc.cls}`;

  document.getElementById('J_weekLbl').textContent =
    weekOffset === 0 ? 'Esta semana' :
    weekOffset === -1 ? 'Sem. anterior' :
    `Hace ${Math.abs(weekOffset)} sem.`;
}

function renderStreak() {
  const streak = calcStreak();
  const best   = bestStreak();
  const icon   = document.getElementById('J_streakIcon');
  const lbl    = document.getElementById('J_streakLbl');
  const sub    = document.getElementById('J_streakSub');
  const val    = document.getElementById('J_streakVal');

  if (streak === 0) {
    icon.textContent = '—';
    lbl.textContent  = 'Sin racha activa';
    sub.textContent  = best > 0 ? `Mejor racha: ${best} ${best === 1 ? 'día' : 'días'}` : 'Estudia hoy para empezar';
    val.textContent  = '';
  } else {
    icon.textContent = '🔥';
    lbl.textContent  = streak === 1 ? '1 día de racha' : `${streak} días de racha`;
    sub.textContent  = streak >= 7 ? '¡Semana completa!' :
                       streak >= 3 ? '¡Sigue así!' : 'Buen comienzo';
    val.textContent  = `${streak}`;
    // Mostrar mejor racha si la actual no la supera
    if (best > streak) {
      sub.textContent += ` · Mejor: ${best}d`;
    } else if (streak === best && streak > 1) {
      sub.textContent += ' · ¡Récord personal!';
    }
  }
}

function renderChart() {
  const cont = document.getElementById('J_chart');
  const LBL  = ['L','M','X','J','V','S','D'];
  const days = weekOf(weekOffset);
  const tok  = today();
  const vals = days.map(d => daySum(dk(d)));
  const mx   = Math.max(...vals, 0.5);

  const Sm = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  document.getElementById('J_weekRange').textContent =
    `${days[0].getDate()} – ${days[6].getDate()} ${Sm[days[6].getMonth()]}`;

  cont.innerHTML = '';
  days.forEach((d, i) => {
    const isT = dk(d) === tok;
    const v   = vals[i];
    const hp  = v === 0 ? 0 : Math.max(v / mx * 85, 5);

    const col = document.createElement('div');
    col.className = 'bar-col';

    const bar = document.createElement('div');
    bar.className = `bar${isT ? ' active' : ''}`;
    bar.style.height = '0%';
    if (v > 0) bar.title = fmt(v);

    const lbl = document.createElement('div');
    lbl.className = `bar-lbl${isT ? ' active' : ''}`;
    lbl.textContent = LBL[i];

    col.appendChild(bar);
    col.appendChild(lbl);
    cont.appendChild(col);

    setTimeout(() => { bar.style.height = `${hp}%`; }, i * 45);
  });
}

function renderSubjects() {
  const list = document.getElementById('J_subjects');

  if (!data.subjects.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">◻</div>
        <div class="empty-txt">Sin asignaturas todavía.<br>Pulsa "Añadir" para comenzar.</div>
      </div>`;
    return;
  }

  const emptyEl = list.querySelector('.empty');
  if (emptyEl) emptyEl.remove();

  const seen = new Set();
  data.subjects.forEach((sub, idx) => {
    seen.add(sub.id);
    const tod   = subDay(sub.id);
    const wk    = subWeek(sub.id);
    const color = sub.color || COLORS[0];
    let card    = list.querySelector(`[data-sid="${sub.id}"]`);

    if (card) {
      card.querySelector('.sc-dot').style.background = color;
      card.querySelector('.sc-name').textContent = sub.name;
      card.querySelector('.sc-week').textContent =
        weekOffset === 0
          ? `${fmt(wk)} esta semana`
          : `${fmt(wk)} esa semana`;
      const examEl = card.querySelector('.sc-exam');
      if (examEl) examEl.innerHTML = examBadgeHtml(sub.examDate);
      const hEl = card.querySelector('.sc-today');
      if (hEl.textContent !== fmt(tod)) {
        hEl.textContent = fmt(tod);
        hEl.classList.remove('pop');
        void hEl.offsetWidth;
        hEl.classList.add('pop');
      }
    } else {
      card = document.createElement('div');
      card.className = 'sc';
      card.dataset.sid = sub.id;
      card.style.animationDelay = `${idx * 50}ms`;
      card.innerHTML = `
        <div class="sc-dot" style="background:${color}"></div>
        <div class="sc-info">
          <div class="sc-name">${esc(sub.name)}</div>
          <div class="sc-week">${fmt(wk)} ${weekOffset === 0 ? 'esta semana' : 'esa semana'}</div>
          <div class="sc-exam">${examBadgeHtml(sub.examDate)}</div>
        </div>
        <div class="sc-today">${fmt(tod)}</div>
        <div class="sc-ctrl">
          <button class="hbtn" data-op="m"    aria-label="−25 min">−</button>
          <button class="hbtn pomo" data-op="p" aria-label="+25 min (pomodoro)">🍅</button>
          <button class="hbtn hr"  data-op="h"  aria-label="+1 hora">+1h</button>
        </div>
        <button class="sc-edit" aria-label="Editar asignatura">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1.5 10.5L9 3l2 2L3.5 12.5H1.5v-2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M8 4l2 2" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>`;

      card.querySelectorAll('.hbtn').forEach(btn => {
        btn.addEventListener('click', e => {
          const sid = card.dataset.sid;
          let delta;
          if      (btn.dataset.op === 'p') delta = +POMO;
          else if (btn.dataset.op === 'h') delta = 1;
          else                              delta = -POMO;

          if (delta < 0 && subDay(sid) < 0.001) return;
          ripple(btn, e);
          floatLabel(card, delta);
          adjust(sid, delta);
          render();
        });
      });

      card.querySelector('.sc-edit').addEventListener('click', () => {
        const s = data.subjects.find(s => s.id === sub.id);
        if (s) openEdit(s.id, s.name, s.color || COLORS[0], s.examDate || '');
      });

      list.appendChild(card);
    }
  });

  list.querySelectorAll('[data-sid]').forEach(el => {
    if (!seen.has(el.dataset.sid)) el.remove();
  });
}

═══════════════════════════════════ */
function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function ripple(el, e) {
  const r  = document.createElement('span');
  r.className = 'ripple';
  const rc = el.getBoundingClientRect();
  const sz = Math.max(rc.width, rc.height);
  r.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px`;
  el.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function floatLabel(card, delta) {
  const lbl = document.createElement('span');
  lbl.className = `float-lbl ${delta > 0 ? 'pos' : 'neg'}`;
  lbl.textContent = delta > 0
    ? (Math.abs(delta) < 1 ? '+25m' : '+1h')
    : '−25m';
  const ctrl = card.querySelector('.sc-ctrl');
  ctrl.style.position = 'relative';
  lbl.style.top = '-8px';
  ctrl.appendChild(lbl);
  lbl.addEventListener('animationend', () => lbl.remove());
}

let toastT;
function toast(msg) {
  const el = document.getElementById('J_toast');
  clearTimeout(toastT);
  el.textContent = msg;
  el.classList.add('show');
  toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

function doSave() {
  const name = document.getElementById('J_input').value.trim();
  if (!name) { document.getElementById('J_input').focus(); return; }
  if (editId) {
    const s = data.subjects.find(s => s.id === editId);
    if (s) {
      s.name  = name;
      s.color = selectedColor;
      const examVal = document.getElementById('J_examInput').value;
      s.examDate = examVal || null;
      persist();
    }
  } else {
    data.subjects.push({ id: `${Date.now()}`, name, color: selectedColor });
    persist();
  }
  hideSheet();
  render();
  toast(editId ? '✓ Asignatura actualizada' : '✓ Asignatura añadida');
}

function doDelete() {
  if (!confirm('¿Eliminar esta asignatura?\nSe perderán todos sus registros.')) return;
  data.subjects = data.subjects.filter(s => s.id !== editId);
  Object.keys(data.logs).forEach(k => {
    delete data.logs[k][editId];
    if (!Object.keys(data.logs[k]).length) delete data.logs[k];
  });
  persist();
  hideSheet();
  render();
  toast('Asignatura eliminada');
}

function showSheet() {
  document.getElementById('J_overlay').classList.add('open');
  setTimeout(() => document.getElementById('J_input').focus(), 440);
}

function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function initPush() {
  if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (Notification.permission === 'denied') return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    pushEnabled = !!sub;
  } catch {}
}

async function togglePush() {
  if (!('Notification' in window)) return;
  if (pushEnabled) {
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) await sub.unsubscribe();
      await apiFetch('/api/push/subscribe', { method: 'DELETE' });
      pushEnabled = false;
      renderHeader();
      toast('Notificaciones desactivadas');
    } catch { toast('Error al desactivar'); }
  } else {
    try {
      if (Notification.permission !== 'granted') {
        const p = await Notification.requestPermission();
        if (p !== 'granted') { toast('Permiso denegado'); return; }
      }
      const keyRes = await apiFetch('/api/push/key');
      if (!keyRes.ok) { toast('Push no disponible'); return; }
      const { publicKey } = await keyRes.json();
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });
      await apiFetch('/api/push/subscribe', { method: 'POST', body: JSON.stringify({ subscription: sub }) });
      pushEnabled = true;
      renderHeader();
      toast('🔔 Notificaciones activadas');
    } catch (e) {
      console.error(e);
      toast('Error al activar notificaciones');
    }
  }
}

async function pollLeaderboard() {
  if (!lbGroupId) return;

    const res = await apiFetch(`/api/groups/${lbGroupId}/leaderboard`);
    if (!res.ok) return;

function renderLeaderboard() {
  if (!lbData) return;
  const { group, board } = lbData;

  document.getElementById('J_lbName').textContent = group.name;
  const codeBtn = document.getElementById('J_lbCodeBtn');
  codeBtn.textContent = `${group.code} · Copiar`;
  codeBtn.dataset.code = group.code;

  const sorted = [...board].sort((a,b) => b[lbMetric] - a[lbMetric]);
  const el     = document.getElementById('J_lbBoard');

  if (!sorted.length) {
    el.innerHTML = '<div class="lb-empty">Sin miembros aún</div>';
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const leader = sorted[0][lbMetric];
  el.innerHTML = '';

  sorted.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = `lb-row${m.isMe ? ' me' : ''}`;

    const rankHtml = i < 3
      ? `<div class="lb-rank">${medals[i]}</div>`
      : `<div class="lb-rank num">${i+1}</div>`;

    let diffHtml;
    if (i === 0 && m[lbMetric] > 0) {
      diffHtml = `<div class="lb-diff leader">Líder 🔥</div>`;
    } else if (m[lbMetric] === 0) {
      diffHtml = `<div class="lb-diff" style="color:var(--t3)">Sin horas</div>`;
    } else {
      const gap = leader - m[lbMetric];
      diffHtml = `<div class="lb-diff behind">−${fmt(gap)} al líder</div>`;
    }

    const reactHtml = !m.isMe ? `
      <div class="lb-reactions">
        ${VALID_EMOJIS.map(emoji => {
          const r = m.reactions?.[emoji] || { count: 0, iMine: false };
          return `<button class="lb-reaction${r.iMine ? ' mine' : ''}"
            onclick="sendReaction('${lbGroupId}','${m.id}','${emoji}')"
          >${emoji}${r.count > 0 ? ` ${r.count}` : ''}</button>`;
        }).join('')}
      </div>` : '';

    row.innerHTML = `
      ${rankHtml}
      <div class="lb-user">
        <div class="lb-username">${esc(m.username)}</div>
        ${m.isMe ? '<div class="lb-you">tú</div>' : ''}
        ${reactHtml}
      </div>
      <div class="lb-stats">
        <div class="lb-hrs">${fmt(m[lbMetric])}</div>
        ${diffHtml}
      </div>`;
    el.appendChild(row);
  });
}

function renderSubjectBoard() {
  if (!lbData) return;
  const { board } = lbData;
  const el = document.getElementById('J_lbBoard');

  // Collect all unique subjects across members
  const allSubjects = new Map(); // lowerKey -> displayName
  board.forEach(m => {
    if (!m.bySubject) return;
    Object.entries(m.bySubject).forEach(([key, sub]) => {
      if (!allSubjects.has(key)) allSubjects.set(key, sub.name);
    });
  });

  if (allSubjects.size === 0) {
    el.innerHTML = '<div class="lb-empty">Ningún miembro tiene asignaturas todavía</div>';
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = '';

  allSubjects.forEach((name, key) => {
    const members = board
      .map(m => ({ username: m.username, isMe: m.isMe, h: m.bySubject?.[key]?.week || 0 }))
      .filter(m => m.h > 0)
      .sort((a, b) => b.h - a.h);

    if (!members.length) return;

    const section = document.createElement('div');
    section.className = 'lb-subj-section';

    const rows = members.map((m, i) => {
      const rankHtml = i < 3
        ? `<span class="lb-subj-rank">${medals[i]}</span>`
        : `<span class="lb-subj-rank num">${i+1}</span>`;
      return `
        <div class="lb-subj-row${m.isMe ? ' me' : ''}">
          ${rankHtml}
          <span class="lb-subj-user${m.isMe ? ' me' : ''}">${esc(m.username)}${m.isMe ? ' · tú' : ''}</span>
          <span class="lb-subj-hrs">${fmt(m.h)}</span>
        </div>`;
    }).join('');

    section.innerHTML = `<div class="lb-subj-title">${esc(name)}</div>${rows}`;
    el.appendChild(section);
  });
}

async function sendReaction(groupId, toUserId, emoji) {
  try {
    const res  = await apiFetch(`/api/groups/${groupId}/reactions`, {
      method: 'POST', body: JSON.stringify({ toUserId, emoji })
    });
    if (!res.ok) return;
    // Refrescar el leaderboard para reflejar el cambio
    const r2 = await apiFetch(`/api/groups/${groupId}/leaderboard`);
    if (r2.ok) {
      lbData = await r2.json();
      if (lbMetric === 'subjects') renderSubjectBoard();
      else renderLeaderboard();
    }
  } catch {}
}

document.getElementById('J_lbOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('J_lbOverlay')) closeLb();
});

/* ═══════════════════════════════════
   Service Worker
═══════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}

/* ═══════════════════════════════════
   Boot
═══════════════════════════════════ */
async function boot() {
  renderHeader();
  const token = getToken();
  if (!token) { showAuth(); return; }
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    currentUser = payload.username;
    await Promise.all([loadData(), loadSettings()]);
    await initPush();
    hideAuth();
    render();
    loadGroups();
    setInterval(loadGroups, 30000);
  } catch {
    clearToken();
    showAuth();
  }
}

boot();
</script>
</body>
</html>
