<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Study Hours — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* Warm off-black base, paper-cream text, single amber accent */
    --bg:      oklch(0.18 0.008 80);
    --bg2:     oklch(0.22 0.009 80);
    --surface: oklch(0.24 0.010 80);
    --line:    oklch(0.30 0.010 80);
    --line2:   oklch(0.36 0.012 80);
    --text:    oklch(0.96 0.012 85);
    --t2:      oklch(0.75 0.012 85);
    --t3:      oklch(0.52 0.010 85);
    --t4:      oklch(0.40 0.010 85);
    --accent:  oklch(0.82 0.15 75);
    --accent-dim: oklch(0.82 0.15 75 / 0.14);
    --good:    oklch(0.80 0.14 145);
    --bad:     oklch(0.72 0.16 25);
    --radius: 18px;
  }

  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    letter-spacing: -0.01em;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input { font: inherit; color: inherit; }

  .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.02em; }
  .mono  { font-family: 'JetBrains Mono', monospace; }

  /* ─── Shell ─── */
  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 28px 22px 120px;
    min-height: 100vh;
    position: relative;
    overflow-x: clip;
  }

  /* ─── Header ─── */
  .hdr {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .hdr-left .mark {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--t3);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .hdr-left .date {
    font-size: 14px;
    color: var(--t2);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .hdr-left .date .num { font-size: 24px; color: var(--text); letter-spacing: -0.02em; }
  .hdr-left .date em { font-style: italic; color: var(--t2); }

  .hdr-right {
    display: flex; gap: 6px;
  }
  .icn-btn {
    width: 34px; height: 34px; border-radius: 10px;
    border: 1px solid var(--line);
    color: var(--t2);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s, border-color .15s;
  }
  .icn-btn:hover { background: var(--surface); color: var(--text); border-color: var(--line2); }

  /* ─── Stage (the hero) ─── */
  .stage {
    position: relative;
    height: 460px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background:
      radial-gradient(120% 90% at 50% 120%, var(--accent-dim), transparent 58%),
      linear-gradient(180deg, var(--bg2), var(--bg));
    overflow: hidden;
    margin-bottom: 18px;
    transition: border-color .3s, box-shadow .3s;
  }
  .stage.running {
    border-color: oklch(0.82 0.15 75 / 0.55);
    box-shadow: 0 0 0 1px oklch(0.82 0.15 75 / 0.25), 0 40px 80px -40px oklch(0.82 0.15 75 / 0.35);
  }

  /* Pulse ring when running */
  .pulse {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 260px; height: 260px;
    border-radius: 50%;
    border: 1px solid oklch(0.82 0.15 75 / 0.35);
    opacity: 0;
    pointer-events: none;
  }
  .stage.running .pulse {
    animation: pulse 2.8s cubic-bezier(.4,0,.2,1) infinite;
  }
  .stage.running .pulse.p2 { animation-delay: 1.4s; }
  @keyframes pulse {
    0%   { opacity: 0.6; transform: translate(-50%,-50%) scale(0.6); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.5); }
  }

  /* Watermark (subject name) */
  .watermark {
    position: absolute;
    top: 32px; left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--t3);
    font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: opacity .3s;
  }
  .watermark .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--t3);
    transition: background .3s;
  }
  .stage.armed .watermark .dot,
  .stage.running .watermark .dot { background: var(--_sub-color, var(--accent)); }
  .stage.armed .watermark,
  .stage.running .watermark { color: var(--text); }

  /* The clock */
  .clock-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -54%);
    text-align: center;
    width: 100%;
  }
  .clock {
    font-size: 128px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    display: inline-flex;
    align-items: baseline;
    gap: 2px;
  }
  .clock .sep {
    display: inline-block;
    transform: translateY(-6px);
    opacity: 0.45;
  }
  .stage.running .clock .sep { animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.1; } }
  .clock .sec {
    font-size: 54px;
    color: var(--t2);
    margin-left: 8px;
    transform: translateY(0);
    font-variant-numeric: tabular-nums;
  }
  .clock-sub {
    margin-top: 18px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--t3);
    font-weight: 600;
  }
  .clock-sub .live {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    transform: translateY(-1px);
    opacity: 0;
  }
  .stage.running .clock-sub .live { opacity: 1; animation: blink 1.3s infinite; }

  /* Idle hint line */
  .stage.idle .clock { color: var(--t4); }
  .stage.idle .clock .sec { color: var(--t4); }

  /* Stage controls */
  .stage-controls {
    position: absolute;
    left: 0; right: 0; bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 0 12px;
  }
  .stage-controls.paused {
    gap: 10px;
    padding: 0 16px;
  }
  .stage-controls.paused .big-btn {
    height: 52px;
    padding: 0 20px;
    font-size: 13px;
    letter-spacing: 0.04em;
    gap: 8px;
    flex: 1 1 0;
    min-width: 0;
    white-space: nowrap;
    justify-content: center;
  }
  .stage-controls.paused .big-btn .play-ico { flex: 0 0 auto; }
  .big-btn {
    height: 64px;
    padding: 0 36px;
    border-radius: 999px;
    background: var(--text);
    color: var(--bg);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 12px;
    transition: transform .15s, opacity .2s, background .2s;
    box-shadow: 0 12px 30px -14px rgba(0,0,0,0.6);
  }
  .big-btn:hover { transform: translateY(-1px); }
  .big-btn:active { transform: translateY(0) scale(0.98); }
  .big-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .big-btn.ghost {
    background: transparent;
    color: var(--t2);
    border: 1px solid var(--line2);
  }
  .big-btn.ghost:hover { color: var(--text); border-color: var(--text); background: rgba(255,255,255,0.04); }
  .big-btn.accent { background: var(--accent); color: oklch(0.2 0.02 80); }
  .big-btn .play-ico {
    width: 0; height: 0;
    border-left: 10px solid currentColor;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    margin-left: 2px;
  }
  .big-btn .stop-ico {
    width: 12px; height: 12px;
    background: currentColor;
    border-radius: 2px;
  }

  /* ─── Subject chips ─── */
  .chips-section {
    margin-bottom: 24px;
    position: relative;
  }
  .chips-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--t3);
    font-weight: 600;
  }
  .chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin: 0 -22px;
    padding-left: 22px;
    padding-right: 22px;
    cursor: grab;
  }
  .chips.dragging { cursor: grabbing; }
  .chips.fade-l.fade-r {
    -webkit-mask-image: linear-gradient(to right, transparent 0, #000 28px, #000 calc(100% - 28px), transparent 100%);
            mask-image: linear-gradient(to right, transparent 0, #000 28px, #000 calc(100% - 28px), transparent 100%);
  }
  .chips.fade-l:not(.fade-r) {
    -webkit-mask-image: linear-gradient(to right, transparent 0, #000 28px);
            mask-image: linear-gradient(to right, transparent 0, #000 28px);
  }
  .chips.fade-r:not(.fade-l) {
    -webkit-mask-image: linear-gradient(to left, transparent 0, #000 28px);
            mask-image: linear-gradient(to left, transparent 0, #000 28px);
  }
  .chips-hint {
    position: absolute;
    right: 2px;
    top: calc(50% + 14px);
    transform: translateY(-50%);
    color: var(--t3); font-size: 14px; line-height: 1;
    pointer-events: none; opacity: 0;
    transition: opacity .3s;
    z-index: 3;
  }
  .chips-section.more-right .chips-hint { opacity: 0.55; }
  .chip {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 12px 14px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--bg2);
    color: var(--text);
    transition: border-color .15s, background .15s, transform .1s;
    min-width: max-content;
  }
  .chip:hover { border-color: var(--line2); }
  .chip:active { transform: scale(0.97); }
  .chip .sw {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--_c, var(--accent));
    flex-shrink: 0;
    box-shadow: 0 0 0 2px oklch(from var(--_c, var(--accent)) l c h / 0.2);
  }
  .chip .name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap;
  }
  .chip .today {
    font-size: 11px; color: var(--t3);
    font-variant-numeric: tabular-nums;
  }
  .chip.selected {
    border-color: var(--_c, var(--accent));
    background: oklch(from var(--_c, var(--accent)) l c h / 0.1);
  }
  .chip.selected .today { color: var(--t2); }
  .chip.locked { opacity: 0.4; pointer-events: none; }
  .chip.new {
    border-style: dashed;
    color: var(--t2);
  }
  .chip.new:hover { color: var(--text); }

  /* ─── Stats row ─── */
  .stats {
    display: grid;
    grid-template-columns: 1.3fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    position: relative;
    overflow: hidden;
  }
  .stat .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--t3);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .stat .val {
    font-size: 36px;
    line-height: 0.95;
    color: var(--text);
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .stat .val .unit { font-size: 16px; color: var(--t3); margin-left: 2px; }
  .stat .meta {
    margin-top: 8px;
    font-size: 11px;
    color: var(--t3);
    display: flex; align-items: center; gap: 6px;
  }
  .stat .meta .delta.up { color: var(--good); }
  .stat .meta .delta.down { color: var(--bad); }
  .stat.streak { display: flex; flex-direction: column; }
  .stat .flame {
    font-size: 18px; line-height: 1;
  }

  /* ─── Daily goal card ─── */
  .goal-card {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px 16px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
  }
  .goal-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(120% 80% at 0% 0%, var(--accent-dim), transparent 50%);
    pointer-events: none;
  }
  .goal-card:hover { border-color: var(--line2); }
  .goal-card:active { transform: scale(0.997); }
  .goal-card.empty {
    border-style: dashed;
    padding: 18px;
    text-align: center;
  }
  .goal-card.empty .gl-prompt {
    font-size: 14px; color: var(--t2);
    margin-top: 6px;
    letter-spacing: -0.01em;
  }
  .goal-card.empty .gl-lbl {
    font-size: 10px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.2em; font-weight: 600;
  }
  .goal-card .gl-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px;
    gap: 10px;
  }
  .goal-card .gl-lbl {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--t3); font-weight: 600;
  }
  .goal-card .gl-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .goal-card .gl-nums {
    display: flex; align-items: baseline; gap: 6px;
    line-height: 0.95;
    margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
  }
  .goal-card .gl-cur {
    font-family: 'Instrument Serif', serif;
    font-size: 40px; letter-spacing: -0.03em;
    color: var(--text);
  }
  .goal-card .gl-cur .u { font-size: 16px; color: var(--t3); margin-left: 1px; }
  .goal-card .gl-sep { color: var(--t4); font-size: 18px; margin: 0 2px; }
  .goal-card .gl-goal {
    font-size: 14px; color: var(--t3); font-weight: 500;
  }
  .goal-card .gl-bar {
    height: 6px; border-radius: 99px;
    background: oklch(0.22 0.009 80);
    overflow: hidden;
    position: relative;
  }
  .goal-card .gl-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, oklch(from var(--accent) calc(l + 0.08) c h) 100%);
    border-radius: 99px;
    transition: width 0.9s cubic-bezier(.34,1.2,.64,1);
    position: relative;
  }
  .goal-card .gl-fill::after {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 6px;
    background: oklch(from var(--accent) calc(l + 0.15) c h);
    box-shadow: 0 0 10px var(--accent);
    border-radius: 99px;
  }
  .goal-card .gl-foot {
    margin-top: 10px;
    font-size: 11px; color: var(--t3);
    letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px;
  }
  .goal-card.done {
    border-color: oklch(from var(--accent) l c h / 0.5);
    background: linear-gradient(180deg, oklch(from var(--accent) l c h / 0.07), var(--bg2));
  }
  .goal-card.done .gl-foot {
    color: var(--accent);
    font-weight: 600;
  }
  .goal-card.done .gl-cur { color: var(--accent); }

  /* ─── Week chart ─── */
  .week-card {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 20px 18px;
    margin-bottom: 18px;
  }
  .week-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .week-nav { display: inline-flex; align-items: center; gap: 6px; }
  .nav-btn {
    width: 24px; height: 24px;
    border-radius: 8px;
    color: var(--t3);
    display: inline-flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  .nav-btn:hover { color: var(--text); background: var(--surface); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .week-range { font-size: 11px; color: var(--t2); min-width: 90px; text-align: center; letter-spacing: 0.02em; }
  .week-bars {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    height: 120px;
    align-items: end;
  }
  .wb-col {
    display: flex; flex-direction: column; align-items: center;
    height: 100%; gap: 8px;
  }
  .wb-bar-wrap {
    flex: 1; width: 100%;
    display: flex; align-items: flex-end;
    position: relative;
  }
  .wb-bar {
    width: 100%;
    background: var(--line);
    border-radius: 6px 6px 3px 3px;
    transition: height 0.7s cubic-bezier(.34,1.2,.64,1), background .25s;
    min-height: 2px;
    position: relative;
  }
  .wb-bar.has-data { background: var(--t3); }
  .wb-bar.today { background: var(--accent); box-shadow: 0 0 16px oklch(0.82 0.15 75 / 0.35); }
  .wb-bar .tip {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    background: var(--text);
    color: var(--bg);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 5px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .wb-bar:hover .tip { opacity: 1; }
  .wb-lbl { font-size: 11px; color: var(--t4); letter-spacing: 0.1em; }
  .wb-lbl.today { color: var(--text); font-weight: 600; }

  /* ─── Subjects list (manage) ─── */
  .subjects-list {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 18px;
  }
  .sl-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    transition: background .15s;
  }
  .sl-row:last-child { border-bottom: none; }
  .sl-row:hover { background: var(--surface); }
  .sl-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--_c, var(--accent));
    flex-shrink: 0;
  }
  .sl-info { flex: 1; min-width: 0; }
  .sl-name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sl-sub {
    font-size: 11px; color: var(--t3); margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .sl-val {
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-family: 'Instrument Serif', serif;
  }
  .sl-val .unit { font-size: 12px; color: var(--t3); margin-left: 2px; }
  .sl-edit {
    color: var(--t4);
    width: 28px; height: 28px;
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  .sl-edit:hover { color: var(--text); background: var(--surface); }

  .sl-empty {
    padding: 30px 20px;
    text-align: center;
    color: var(--t3);
    font-size: 13px;
  }

  /* ─── Bottom totals ─── */
  .grand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 22px 4px 0;
    border-top: 1px solid var(--line);
    margin-top: 8px;
  }
  .grand .lbl { font-size: 12px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.22em; font-weight: 600; }
  .grand .val {
    font-size: 44px;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .grand .val .unit { font-size: 18px; color: var(--t3); }

  /* ─── Sheet modal ─── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    z-index: 200;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .sheet {
    width: 100%;
    max-width: 520px;
    background: var(--bg2);
    border-top: 1px solid var(--line);
    border-radius: 28px 28px 0 0;
    padding: 14px 26px 36px;
    transform: translateY(110%);
    transition: transform .42s cubic-bezier(.34,1.1,.64,1);
  }
  .overlay.open .sheet { transform: translateY(0); }
  .sheet-grip { width: 42px; height: 4px; background: var(--line2); border-radius: 2px; margin: 6px auto 22px; }
  .sheet-title { font-size: 24px; margin-bottom: 22px; letter-spacing: -0.02em; }
  .sheet-title .serif { font-style: italic; color: var(--accent); }
  .field-lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--t3);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .text-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 20px;
  }
  .text-input:focus { border-color: var(--t2); }
  .text-input::placeholder { color: var(--t4); }

  .swatches {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .sw-pick {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid transparent;
    background: var(--_c);
    transition: transform .15s, border-color .15s;
  }
  .sw-pick:hover { transform: scale(1.1); }
  .sw-pick.selected { border-color: var(--text); transform: scale(1.1); }

  .sheet-acts { display: flex; gap: 10px; }
  .s-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.02em;
    transition: transform .1s, opacity .2s, background .2s;
  }
  .s-btn:active { transform: scale(0.97); }
  .s-btn.primary { background: var(--text); color: var(--bg); }
  .s-btn.ghost { border: 1px solid var(--line2); color: var(--t2); }
  .s-btn.ghost:hover { color: var(--text); }
  .s-btn.danger { border: 1px solid oklch(0.72 0.16 25 / 0.3); color: var(--bad); }
  .s-btn.danger:hover { background: oklch(0.72 0.16 25 / 0.08); }

  /* ─── Session commit card ─── */
  .commit-card {
    border: 1px solid var(--accent);
    background:
      radial-gradient(80% 60% at 100% 0%, oklch(0.82 0.15 75 / 0.15), transparent 60%),
      var(--bg2);
  }
  .commit-card .lbl { color: var(--accent); }

  /* ─── Toast ─── */
  .toast {
    position: fixed; left: 50%; bottom: 32px;
    transform: translateX(-50%) translateY(70px);
    background: var(--text); color: var(--bg);
    font-size: 13px; font-weight: 700;
    padding: 10px 18px;
    border-radius: 999px;
    opacity: 0;
    transition: transform .3s cubic-bezier(.34,1.4,.64,1), opacity .3s;
    z-index: 400;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ─── Tweaks panel ─── */
  .tweaks {
    position: fixed;
    right: 16px; bottom: 16px;
    width: 260px;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    z-index: 300;
    display: none;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.5);
  }
  .tweaks.open { display: block; }
  .tweaks h4 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em;
    color: var(--t3); margin-bottom: 10px; font-weight: 600;
  }
  .tweak-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0;
    font-size: 12px; color: var(--t2);
  }
  .tweak-row .swatches-mini { display: flex; gap: 6px; }
  .tw-sw {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--_c);
    border: 2px solid transparent;
    transition: border-color .15s;
  }
  .tw-sw.sel { border-color: var(--text); }
  .tw-toggle {
    width: 34px; height: 20px; border-radius: 999px;
    background: var(--line); position: relative;
    transition: background .2s;
  }
  .tw-toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text);
    transition: transform .2s;
  }
  .tw-toggle.on { background: var(--accent); }
  .tw-toggle.on::after { transform: translateX(14px); }

  /* ═══ GROUPS & COMPETITION ═══ */
  .groups-wrap { margin-bottom: 24px; }
  .groups-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .groups-head .actions { display: flex; gap: 6px; }
  .g-tab-btn {
    font-size: 11px; color: var(--t3);
    padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--line);
    transition: color .15s, border-color .15s, background .15s;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .g-tab-btn:hover { color: var(--text); border-color: var(--line2); }
  .g-tab-btn.primary { background: var(--text); color: var(--bg); border-color: transparent; }
  .g-tab-btn.primary:hover { opacity: 0.9; color: var(--bg); }

  /* Group card */
  .group-card {
    background:
      radial-gradient(120% 80% at 0% 0%, var(--accent-dim), transparent 55%),
      radial-gradient(120% 80% at 100% 100%, oklch(from var(--accent) l c h / 0.08), transparent 55%),
      var(--bg2);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 20px 20px 22px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .group-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .gc-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 14px;
    margin-bottom: 20px;
  }
  .gc-title-wrap { min-width: 0; flex: 1; }
  .gc-name {
    font-size: 22px; letter-spacing: -0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .gc-meta {
    font-size: 11px; color: var(--t3);
    margin-top: 4px;
    display: flex; align-items: center; gap: 8px;
    text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600;
  }
  .gc-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--t4); }
  .gc-meta .live-pill {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--accent);
  }
  .gc-meta .live-pill::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: blink 1.4s infinite;
  }

  .gc-code {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; font-weight: 600;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 7px 10px 7px 12px;
    transition: border-color .15s, background .15s;
  }
  .gc-code:hover { border-color: var(--accent); }
  .gc-code .copy-ico {
    width: 11px; height: 11px;
    opacity: 0.5;
  }

  /* Podium — top 3 */
  .podium {
    display: grid;
    grid-template-columns: 1fr 1.15fr 1fr;
    gap: 10px;
    align-items: end;
    margin-bottom: 22px;
  }
  .pod {
    border-radius: 16px;
    padding: 14px 10px 14px;
    text-align: center;
    position: relative;
    background: var(--surface);
    border: 1px solid var(--line);
    transition: transform .2s;
  }
  .pod:hover { transform: translateY(-2px); }
  .pod[onclick] { cursor: pointer; }
  .pod.me { box-shadow: inset 0 0 0 1px var(--accent); }
  .pod .crown {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    font-size: 18px; line-height: 1;
  }
  .pod .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    margin: 0 auto 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px;
    color: var(--bg);
    background: var(--_c, var(--accent));
    box-shadow: 0 0 0 3px var(--bg2), 0 0 0 4px var(--_c, var(--accent));
    letter-spacing: 0;
  }
  .pod .pod-name {
    font-size: 12px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding: 0 2px;
  }
  .pod .pod-hrs {
    font-family: 'Instrument Serif', serif;
    font-size: 28px; line-height: 1; margin-top: 4px;
    letter-spacing: -0.02em;
  }
  .pod .pod-hrs .u { font-size: 12px; color: var(--t3); margin-left: 1px; }
  .pod .pod-rank {
    position: absolute; top: 10px; right: 12px;
    font-size: 10px; color: var(--t3);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }
  /* Winner pod (middle, tallest) */
  .pod.p1 {
    background:
      radial-gradient(100% 80% at 50% 0%, oklch(from var(--accent) l c h / 0.18), transparent 70%),
      var(--surface);
    border-color: oklch(from var(--accent) l c h / 0.5);
    padding-top: 22px;
  }
  .pod.p1 .avatar {
    width: 58px; height: 58px; font-size: 20px;
  }
  .pod.p1 .pod-hrs { font-size: 34px; }
  .pod.p2 { padding-top: 16px; }
  .pod.p3 { padding-top: 12px; opacity: 0.95; }

  /* Studying state on podium */
  .pod.studying {
    border-color: oklch(from var(--accent) l c h / 0.55);
    box-shadow: 0 0 0 1px oklch(from var(--accent) l c h / 0.4),
                0 14px 30px -18px oklch(from var(--accent) l c h / 0.6);
  }
  .pod.studying .avatar {
    animation: podPulse 1.6s ease-in-out infinite;
  }
  @keyframes podPulse {
    0%, 100% { box-shadow: 0 0 0 3px var(--bg2), 0 0 0 4px var(--_c, var(--accent)); }
    50%      { box-shadow: 0 0 0 3px var(--bg2), 0 0 0 5px var(--_c, var(--accent)), 0 0 18px oklch(from var(--_c, var(--accent)) l c h / 0.7); }
  }
  .pod .live-badge {
    position: absolute; top: 8px; left: 8px;
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 8.5px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent);
    padding: 3px 6px 3px 5px;
    border-radius: 99px;
    background: oklch(from var(--accent) l c h / 0.14);
    border: 1px solid oklch(from var(--accent) l c h / 0.35);
  }
  .pod .live-badge::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite;
  }

  /* Received reactions summary (under pod avatar) */
  .pod .pod-rx {
    display: flex; gap: 3px;
    justify-content: center;
    margin-top: 6px;
    min-height: 16px;
  }
  .pod .pod-rx .rx-chip {
    display: inline-flex; align-items: center; gap: 2px;
    font-size: 11px; line-height: 1;
    padding: 2px 5px;
    border-radius: 99px;
    background: oklch(0.22 0.009 80);
    color: var(--t2);
  }
  .pod .pod-rx .rx-chip .cnt {
    font-size: 9.5px; font-variant-numeric: tabular-nums;
    color: var(--t3); font-weight: 600;
  }
  .pod .pod-rx .rx-chip.mine {
    background: oklch(from var(--accent) l c h / 0.16);
    color: var(--text);
  }

  /* React sheet — large emoji picker modal */
  .react-sheet-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 4px 0 8px;
  }
  .react-sheet-row .react-big {
    aspect-ratio: 1 / 1;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: var(--bg2);
    font-size: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 2px;
    transition: transform .15s, border-color .15s, background .15s;
  }
  .react-sheet-row .react-big:hover { border-color: var(--accent); transform: translateY(-2px); }
  .react-sheet-row .react-big:active { transform: scale(0.94); }
  .react-sheet-row .react-big.mine {
    border-color: var(--accent);
    background: oklch(from var(--accent) l c h / 0.14);
  }
  .react-sheet-row .react-big .cnt {
    font-size: 10px; color: var(--t3);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .react-sheet-row .react-big.mine .cnt { color: var(--accent); }

  /* Ranking list (4+) */
  .rank-list {
    display: flex; flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .rank-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid transparent;
    background: var(--surface);
    transition: background .15s, border-color .15s;
    position: relative;
  }
  .rank-row:hover { background: oklch(0.26 0.010 80); }
  .rank-row.me {
    border-color: var(--accent);
    background: oklch(from var(--accent) l c h / 0.06);
  }
  .rank-row.studying {
    border-color: oklch(from var(--accent) l c h / 0.4);
    background: oklch(from var(--accent) l c h / 0.05);
  }
  .rank-row.studying .av {
    animation: rankPulse 1.6s ease-in-out infinite;
  }
  @keyframes rankPulse {
    0%, 100% { box-shadow: 0 0 0 0 oklch(from var(--_c, var(--accent)) l c h / 0.55); }
    50%      { box-shadow: 0 0 0 4px oklch(from var(--_c, var(--accent)) l c h / 0.0); }
  }
  .rank-row .rk {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; color: var(--t3);
    min-width: 22px; text-align: center;
  }
  .rank-row .av {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--_c, var(--accent));
    color: var(--bg);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px;
    flex-shrink: 0;
  }
  .rank-row .name-col {
    flex: 1; min-width: 0;
  }
  .rank-row .nm {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rank-row .nm .you {
    font-size: 10px;
    color: var(--accent);
    font-weight: 700;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .rank-row .status {
    font-size: 11px; color: var(--t3);
    margin-top: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .rank-row .status .streak-pip {
    color: var(--accent);
    font-weight: 600;
  }
  .rank-row .status .studying-pip {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--accent);
    font-weight: 600;
  }
  .rank-row .status .studying-pip::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite;
  }
  .rank-row .hrs-col {
    text-align: right; flex-shrink: 0;
  }
  .rank-row .hrs {
    font-family: 'Instrument Serif', serif;
    font-size: 22px; line-height: 1; letter-spacing: -0.02em;
  }
  .rank-row .hrs .u { font-size: 11px; color: var(--t3); margin-left: 1px; }
  .rank-row .gap {
    font-size: 10px; color: var(--t4); margin-top: 3px;
    font-variant-numeric: tabular-nums;
  }
  .rank-row .gap.lead {
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
  }

  /* Progress bar (difference from leader) */
  .rank-row .progress-bar {
    position: absolute;
    left: 0; bottom: 0;
    height: 2px;
    background: var(--_c, var(--accent));
    opacity: 0.5;
    border-radius: 0 0 0 14px;
    transition: width 0.8s cubic-bezier(.34,1.2,.64,1);
  }

  /* Inline react strip on rank-rows */
  .rx-inline {
    display: flex; align-items: center; gap: 3px;
    margin-top: 4px;
  }
  .rx-inline .rx-btn {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 2px 5px 2px 4px;
    border-radius: 99px;
    border: 1px solid transparent;
    background: transparent;
    font-size: 11px;
    color: var(--t3);
    transition: border-color .15s, background .15s, transform .1s;
    line-height: 1;
  }
  .rx-inline .rx-btn:hover {
    background: oklch(0.22 0.009 80);
    border-color: var(--line);
  }
  .rx-inline .rx-btn:active { transform: scale(0.9); }
  .rx-inline .rx-btn.mine {
    background: oklch(from var(--accent) l c h / 0.16);
    border-color: oklch(from var(--accent) l c h / 0.4);
    color: var(--text);
    animation: np 0.4s ease;
  }
  .rx-inline .rx-btn .emoji { font-size: 12px; line-height: 1; }
  .rx-inline .rx-btn .cnt { font-size: 10px; font-variant-numeric: tabular-nums; font-weight: 600; }
  .rx-inline .rx-btn.empty { opacity: 0.55; }
  .rx-inline .rx-btn.empty:hover { opacity: 1; }

  /* Live users strip in gc-meta */
  .gc-meta .live-names {
    display: inline-flex; align-items: center; gap: 4px;
    flex-wrap: wrap;
  }
  .gc-meta .live-names .dot-av {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--_c, var(--accent));
    color: var(--bg);
    font-size: 8px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0;
    border: 1.5px solid var(--bg2);
    margin-left: -5px;
  }
  .gc-meta .live-names .dot-av:first-child { margin-left: 0; }
  .gc-meta .live-names .plus {
    font-size: 9px; color: var(--t3);
    margin-left: 2px;
  }

  /* Group tabs (period selector) */
  .period-tabs {
    display: flex; gap: 4px;
    background: oklch(0.20 0.009 80);
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 3px;
    margin-bottom: 16px;
  }
  .period-tab {
    flex: 1;
    padding: 7px 8px;
    border-radius: 8px;
    font-size: 11px; font-weight: 600;
    color: var(--t3);
    transition: background .15s, color .15s;
    letter-spacing: 0.02em;
  }
  .period-tab.active { background: var(--surface); color: var(--text); }

  /* Empty group state */
  .groups-empty {
    background: var(--bg2);
    border: 1px dashed var(--line2);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
  }
  .groups-empty .big {
    font-size: 26px;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .groups-empty .big em { font-family: 'Instrument Serif', serif; font-style: italic; color: var(--accent); }
  .groups-empty .small { font-size: 13px; color: var(--t3); line-height: 1.5; margin-bottom: 18px; }
  .groups-empty .row { display: flex; gap: 8px; justify-content: center; }

  /* Group switcher (when multiple groups) */
  .group-switcher {
    display: flex; gap: 6px; margin-bottom: 10px;
    overflow-x: auto;
    margin: 0 -22px 10px;
    padding: 0 22px;
  }
  .gs-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg2);
    color: var(--t2);
    font-size: 12px; font-weight: 600;
    transition: color .15s, border-color .15s, background .15s;
  }
  .gs-btn:hover { color: var(--text); border-color: var(--line2); }
  .gs-btn.active { color: var(--text); border-color: var(--accent); background: oklch(from var(--accent) l c h / 0.08); }

  /* Headline comparison strip (taunt card) */
  .taunt {
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--t2);
    line-height: 1.4;
  }
  .taunt .ico {
    width: 34px; height: 34px; border-radius: 10px;
    background: oklch(from var(--accent) l c h / 0.14);
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .taunt b { color: var(--text); font-weight: 700; }

  /* Mobile */
  @media (max-width: 420px) {
    .app { padding: 20px 16px 100px; }
    .stage { height: 420px; }
    .clock { font-size: 100px; }
    .clock .sec { font-size: 44px; }
    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat:first-child { grid-column: 1 / -1; }
  }

  /* Entrance */
  .fade-in { animation: fi .4s cubic-bezier(.34,1.2,.64,1) both; }
  @keyframes fi { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .num-pop { animation: np .35s cubic-bezier(.34,1.8,.64,1); }
  @keyframes np { 0% { transform: scale(1); } 45% { transform: scale(1.15); } 100% { transform: scale(1); } }
</style>
</head>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "mint",
    "showSeconds": true,
    "clockSize": "m"
  }/*EDITMODE-END*/;
</script>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   DATA LAYER  —  backed by /api/data
═══════════════════════════════════════════════ */
const COLORS = [
  '#e8b04a','#7ab7ff','#8adba4','#c29cff',
  '#ff9f89','#ffc061','#86dbd4','#ff8fb3'
];

const TOKEN_KEY = 'sh_token';
const getToken  = () => localStorage.getItem(TOKEN_KEY);
const setToken  = (t) => localStorage.setItem(TOKEN_KEY, t);
const clearToken= () => localStorage.removeItem(TOKEN_KEY);

let currentUser = null;
let data     = { subjects: [], logs: {} };
let settings = { dailyGoal: 0 };
let pushEnabled = false;

async function apiFetch(url, opts = {}) {
  const token = getToken();
  return fetch(url, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
      ...(opts.headers || {})
    }
  });
}

let saveTimer = null;
function saveStore() {
  // Debounced PUT so rapid timer ticks don't flood the server
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    apiFetch('/api/data', {
      method: 'PUT',
      body: JSON.stringify({ subjects: data.subjects, logs: data.logs })
    }).catch(() => {});
  }, 400);
}
async function loadStore() {
  try {
    const res = await apiFetch('/api/data');
    if (!res.ok) throw new Error('data');
    const json = await res.json();
    data.subjects = json.subjects || [];
    data.logs     = json.logs || {};
  } catch { /* keep empty */ }
}
async function loadSettings() {
  try {
    const res = await apiFetch('/api/settings');
    if (res.ok) settings = { dailyGoal: 0, ...(await res.json()) };
  } catch {}
}
function saveSettings(patch) {
  settings = { ...settings, ...patch };
  apiFetch('/api/settings', { method: 'PUT', body: JSON.stringify(settings) }).catch(() => {});
}

/* ═══════════════════════════════════════════════
   GROUPS DATA  —  backed by /api/groups
   Real-time via 10s poll while visible.
═══════════════════════════════════════════════ */
const ME_ID = '__me';
const ME_NAME = 'Tú';
const AVATAR_COLORS = ['#e8b04a','#7ab7ff','#8adba4','#c29cff','#ff9f89','#86dbd4','#ff8fb3','#ffc061','#b8e0ff'];

// List of groups I'm in: [{id, name, code, members}]
let groups = [];
// Boards keyed by groupId → { group, board[] } from /leaderboard
let boards = {};
let activeGroupId = null;
let groupPeriod = 'week';  // week | today | total

function colorForUserId(id) {
  // Stable pseudo-hash → palette
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

async function loadGroups() {
  try {
    const res = await apiFetch('/api/groups');
    if (!res.ok) { groups = []; return; }
    groups = await res.json();
    if (!activeGroupId || !groups.find(g => g.id === activeGroupId)) {
      activeGroupId = groups[0]?.id || null;
    }
    if (activeGroupId) await loadBoard(activeGroupId);
  } catch { groups = []; }
}

async function loadBoard(gid) {
  try {
    const res = await apiFetch(`/api/groups/${gid}/leaderboard`);
    if (!res.ok) return;
    boards[gid] = await res.json();
  } catch {}
}

let groupsPollT = null;
function startGroupsPoll() {
  stopGroupsPoll();
  groupsPollT = setInterval(async () => {
    if (document.visibilityState !== 'visible') return;
    if (!activeGroupId) return;
    await loadBoard(activeGroupId);
    // Only re-render if no sheet is open (avoid ripping inputs out under the user)
    if (!document.querySelector('.overlay.open')) render();
  }, 10000);
}
function stopGroupsPoll() {
  clearInterval(groupsPollT);
  groupsPollT = null;
}

/* ═══════════════════════════════════════════════
   DATE HELPERS
═══════════════════════════════════════════════ */
function dk(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function today() { return dk(new Date()); }

let weekOffset = 0;
function weekOf(off = weekOffset) {
  const t = new Date(), dow = (t.getDay() + 6) % 7;
  const mon = new Date(t);
  mon.setDate(t.getDate() - dow + off * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function daySum(key) {
  const d = data.logs[key];
  return d ? Object.values(d).reduce((s,v) => s + v, 0) : 0;
}
function weekSum(off = weekOffset) {
  return weekOf(off).reduce((s,d) => s + daySum(dk(d)), 0);
}
function subDay(sid) { return (data.logs[today()] || {})[sid] || 0; }
function subAll(sid) { return Object.values(data.logs).reduce((s,d) => s + (d[sid] || 0), 0); }
function grandTotal() { return data.subjects.reduce((s, sub) => s + subAll(sub.id), 0); }

function calcStreak() {
  const d = new Date();
  let s = 0;
  if (daySum(dk(d)) === 0) d.setDate(d.getDate() - 1);
  while (daySum(dk(d)) > 0) {
    s++;
    d.setDate(d.getDate() - 1);
  }
  return s;
}

function addTime(sid, hours) {
  const k = today();
  if (!data.logs[k]) data.logs[k] = {};
  data.logs[k][sid] = Math.max(0, +((data.logs[k][sid] || 0) + hours).toFixed(4));
  if (data.logs[k][sid] === 0) delete data.logs[k][sid];
  if (!Object.keys(data.logs[k]).length) delete data.logs[k];
  saveStore();
}

/* ═══════════════════════════════════════════════
   FORMAT
═══════════════════════════════════════════════ */
function fmt(h) {
  if (!h) return { n: '0', unit: 'h' };
  const hr = Math.floor(h);
  const mn = Math.round((h - hr) * 60);
  if (mn === 60) return { n: `${hr+1}`, unit: 'h' };
  if (hr === 0) return { n: `${mn}`, unit: 'm' };
  if (mn === 0) return { n: `${hr}`, unit: 'h' };
  return { n: `${hr}h ${mn}`, unit: 'm' };
}
function fmtStr(h) { const f = fmt(h); return `${f.n}${f.unit}`; }

/* ═══════════════════════════════════════════════
   TIMER STATE
═══════════════════════════════════════════════ */
let timer = {
  running: false,
  startedAt: null,
  elapsed: 0,
  subjectId: null
};
// Restore running timer from storage
try {
  const t = JSON.parse(localStorage.getItem('sh_redesign_timer') || 'null');
  if (t && t.running) timer = t;
} catch {}

function saveTimerState() {
  localStorage.setItem('sh_redesign_timer', JSON.stringify(timer));
}

/* Broadcast study status to server so groupmates see "estudiando ahora" */
let studyHeartbeat = null;
function pushStudyStatus(studying) {
  apiFetch('/api/study-status', {
    method: 'POST',
    body: JSON.stringify({ studying, subjectId: studying ? timer.subjectId : null })
  }).catch(() => {});
}
function startStudyHeartbeat() {
  stopStudyHeartbeat();
  pushStudyStatus(true);
  studyHeartbeat = setInterval(() => pushStudyStatus(true), 40 * 1000);
}
function stopStudyHeartbeat() {
  if (studyHeartbeat) { clearInterval(studyHeartbeat); studyHeartbeat = null; }
}

let selectedSubject = timer.subjectId ||
  (data.subjects[0] ? data.subjects[0].id : null);

function currentElapsedMs() {
  if (!timer.running) return timer.elapsed;
  return timer.elapsed + (Date.now() - timer.startedAt);
}

function startTimer() {
  if (!selectedSubject) { toast('Elige una asignatura'); return; }
  if (timer.running) return;
  timer.running = true;
  timer.startedAt = Date.now();
  timer.subjectId = selectedSubject;
  saveTimerState();
  startStudyHeartbeat();
  render();
}
function pauseTimer() {
  if (!timer.running) return;
  timer.elapsed += Date.now() - timer.startedAt;
  timer.running = false;
  timer.startedAt = null;
  saveTimerState();
  stopStudyHeartbeat();
  pushStudyStatus(false);
  render();
}
function resumeTimer() {
  if (timer.running) return;
  if (timer.elapsed <= 0) return;
  timer.running = true;
  timer.startedAt = Date.now();
  saveTimerState();
  startStudyHeartbeat();
  render();
}
function resetTimer() {
  timer = { running: false, startedAt: null, elapsed: 0, subjectId: null };
  saveTimerState();
  stopStudyHeartbeat();
  pushStudyStatus(false);
  render();
}
function stopAndCommit() {
  if (timer.running) {
    timer.elapsed += Date.now() - timer.startedAt;
    timer.running = false;
    timer.startedAt = null;
    stopStudyHeartbeat();
    pushStudyStatus(false);
  }
  if (timer.elapsed < 1000) { resetTimer(); return; }
  saveTimerState();
  render();
}
function commitSession() {
  const hours = timer.elapsed / 1000 / 3600;
  if (timer.subjectId && hours > 0) {
    addTime(timer.subjectId, hours);
    const sub = data.subjects.find(s => s.id === timer.subjectId);
    toast(`+${fmtStr(hours)} · ${sub?.name || ''}`);
  }
  resetTimer();
}

/* ═══════════════════════════════════════════════
   TWEAKS
═══════════════════════════════════════════════ */
let tweaks = { ...TWEAK_DEFAULTS };
const ACCENTS = {
  amber:   { c: 'oklch(0.82 0.15 75)',  dim: 'oklch(0.82 0.15 75 / 0.14)' },
  mint:    { c: 'oklch(0.82 0.14 165)', dim: 'oklch(0.82 0.14 165 / 0.14)' },
  violet:  { c: 'oklch(0.78 0.15 300)', dim: 'oklch(0.78 0.15 300 / 0.14)' },
  coral:   { c: 'oklch(0.78 0.15 25)',  dim: 'oklch(0.78 0.15 25 / 0.14)' }
};
function applyTweaks() {
  const a = ACCENTS[tweaks.accent] || ACCENTS.amber;
  document.documentElement.style.setProperty('--accent', a.c);
  document.documentElement.style.setProperty('--accent-dim', a.dim);
  render();
}
function setTweak(k, v) {
  tweaks[k] = v;
  window.parent.postMessage({type: '__edit_mode_set_keys', edits: { [k]: v }}, '*');
  applyTweaks();
  renderTweaks();
}
function toggleTweak(k) {
  setTweak(k, !tweaks[k]);
}
function renderTweaks() {
  const row = document.getElementById('tw-accent');
  row.innerHTML = '';
  Object.keys(ACCENTS).forEach(k => {
    const b = document.createElement('button');
    b.className = 'tw-sw' + (tweaks.accent === k ? ' sel' : '');
    b.style.setProperty('--_c', ACCENTS[k].c);
    b.onclick = () => setTweak('accent', k);
    row.appendChild(b);
  });
  document.getElementById('tw-sec').classList.toggle('on', !!tweaks.showSeconds);
}

/* Listen for toolbar Tweaks toggle */
window.addEventListener('message', (e) => {
  if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks').classList.add('open');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');
});
setTimeout(() => {
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
}, 200);

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s || ''));
  return d.innerHTML;
}

function render() {
  const root = document.getElementById('root');
  root.innerHTML = buildApp();
  renderTweaks();
  wireUp();
}

function buildApp() {
  return `
    <div class="app">
      ${buildHeader()}
      ${buildStage()}
      ${buildChips()}
      ${buildStats()}
      ${buildGoal()}
      ${buildWeek()}
      ${buildSubjects()}
      ${buildGroups()}
      ${buildGrand()}
    </div>
  `;
}

/* ═══════════════════════════════════════════════
   GROUPS UI
═══════════════════════════════════════════════ */
function getActiveGroup() { return groups.find(g => g.id === activeGroupId); }

function buildGroups() {
  if (!groups.length) {
    return `
      <section class="groups-wrap">
        <div class="groups-head">
          <span class="section-label">Compite con amigos</span>
        </div>
        <div class="groups-empty">
          <div class="big">Estudia <em>en compañía</em></div>
          <div class="small">Crea un grupo o únete con un código.<br>Rankings semanales, reacciones y rachas en vivo.</div>
          <div class="row">
            <button class="s-btn ghost" onclick="openJoinGroup()">Unirse con código</button>
            <button class="s-btn primary" onclick="openCreateGroup()">Crear grupo</button>
          </div>
        </div>
      </section>
    `;
  }

  const g = groups.find(x => x.id === activeGroupId) || groups[0];
  if (!g) return '';
  const lb = boards[g.id];
  if (!lb) {
    // Board not yet loaded — kick it off and show a skeleton
    loadBoard(g.id).then(() => render());
    return `
      <section class="groups-wrap">
        <div class="groups-head"><span class="section-label">Compite con amigos</span></div>
        <div class="group-card"><div class="gc-head"><div class="gc-title-wrap"><div class="gc-name">${esc(g.name)}</div><div class="gc-meta"><span>Cargando…</span></div></div></div></div>
      </section>
    `;
  }

  // Normalise board members → UI shape
  const members = lb.board.map(m => ({
    id: m.id,
    name: m.username,
    isMe: m.isMe,
    color: m.isMe ? '#e8b04a' : colorForUserId(m.id),
    today: m.today || 0,
    week:  m.week  || 0,
    total: m.total || 0,
    reactions: m.reactions || {},
    // Streak is local-only; studying comes from the server (heartbeat-based)
    streak: m.isMe ? calcStreak() : 0,
    studying: m.isMe ? timer.running : !!m.studying
  }));

  const key = groupPeriod;
  const sorted = [...members].sort((a, b) => (b[key] || 0) - (a[key] || 0));
  const leader = sorted[0];
  const me = members.find(m => m.isMe);
  const myRank = sorted.findIndex(m => m.isMe) + 1;
  const liveCount = members.filter(m => m.studying).length;

  // Taunt headline
  let taunt = '';
  const meVal = me?.[key] || 0;
  const leaderVal = leader?.[key] || 0;
  if (leader?.isMe && leaderVal > 0) {
    const second = sorted[1];
    const gap = meVal - (second?.[key] || 0);
    taunt = `<div class="taunt"><div class="ico">♔</div><div>Vas <b>#1</b>${second ? ` · te sigue <b>${esc(second.name)}</b> a <b>${fmtStr(gap)}</b>` : ''}. Mantén el liderato.</div></div>`;
  } else if (meVal === 0 && leader && leaderVal > 0) {
    taunt = `<div class="taunt"><div class="ico">⚡</div><div><b>${esc(leader.name)}</b> ya lleva <b>${fmtStr(leaderVal)}</b> esta semana. Empieza el cronómetro.</div></div>`;
  } else if (me && myRank > 1) {
    const above = sorted[myRank - 2];
    if (above) {
      const gap = (above[key] || 0) - meVal;
      taunt = `<div class="taunt"><div class="ico">↑</div><div>A <b>${fmtStr(gap)}</b> de alcanzar a <b>${esc(above.name)}</b>. Una sesión y te subes al <b>#${myRank - 1}</b>.</div></div>`;
    }
  }

  // Group switcher
  const switcher = groups.length > 1 ? `
    <div class="group-switcher">
      ${groups.map(gg => `<button class="gs-btn${gg.id === activeGroupId ? ' active' : ''}" onclick="switchGroup('${gg.id}')">${esc(gg.name)}</button>`).join('')}
    </div>
  ` : '';

  // Podium (top 3)
  const podium = sorted.slice(0, Math.min(3, sorted.length));
  const podiumOrder = [podium[1], podium[0], podium[2]].filter(Boolean);
  const podiumClasses = ['p2', 'p1', 'p3'];
  const crowns = ['','♔',''];
  const ranks = ['2','1','3'];
  const podiumHtml = podiumOrder.length >= 2 ? `
    <div class="podium">
      ${podiumOrder.map((m, i) => m ? `
        <div class="pod ${podiumClasses[i]}${m.isMe ? ' me' : ''}${m.studying ? ' studying' : ''}" style="--_c:${m.color}" ${!m.isMe ? `onclick="openReactSheet('${g.id}','${m.id}')"` : ''}>
          ${m.studying ? '<span class="live-badge">EN VIVO</span>' : ''}
          ${crowns[i] ? `<div class="crown">${crowns[i]}</div>` : ''}
          <div class="pod-rank">#${ranks[i]}</div>
          <div class="avatar">${esc(m.name.charAt(0).toUpperCase())}</div>
          <div class="pod-name">${esc(m.name)}</div>
          <div class="pod-hrs">${fmt(m[key] || 0).n}<span class="u">${fmt(m[key] || 0).unit}</span></div>
          ${buildPodRx(m)}
        </div>` : ''
      ).join('')}
    </div>
  ` : '';

  // Ranking list (rank 4+)
  const rest = sorted.slice(3);
  const restHtml = rest.length ? `
    <div class="rank-list">
      ${rest.map((m, i) => {
        const rank = i + 4;
        const val = m[key] || 0;
        const pct = leaderVal > 0 ? Math.min(100, val / leaderVal * 100) : 0;
        const gap = leaderVal - val;
        const gapHtml = val === 0 ? '<span style="color:var(--t4)">sin horas</span>' : `−${fmtStr(gap)} al líder`;
        const status = m.studying
          ? '<span class="studying-pip">estudiando ahora</span>'
          : (m.streak > 0 ? `<span class="streak-pip">✦ ${m.streak} ${m.streak === 1 ? 'día' : 'días'}</span>` : 'sin actividad');
        return `
          <div class="rank-row${m.isMe ? ' me' : ''}${m.studying ? ' studying' : ''}" style="--_c:${m.color}">
            <div class="progress-bar" style="width:${pct}%"></div>
            <div class="rk">${rank}</div>
            <div class="av">${esc(m.name.charAt(0).toUpperCase())}</div>
            <div class="name-col">
              <div class="nm">${esc(m.name)}${m.isMe ? '<span class="you">TÚ</span>' : ''}</div>
              <div class="status">${status}</div>
              ${!m.isMe ? buildRxInline(g.id, m) : ''}
            </div>
            <div class="hrs-col">
              <div class="hrs">${fmt(val).n}<span class="u">${fmt(val).unit}</span></div>
              <div class="gap">${gapHtml}</div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  ` : '';

  // Live users preview — avatars of the people studying right now
  const liveUsers = members.filter(m => m.studying);
  const liveNamesHtml = liveUsers.length > 0 ? `
    <span class="dot"></span>
    <span class="live-names">
      ${liveUsers.slice(0, 3).map(u => `<span class="dot-av" style="--_c:${u.color}" title="${esc(u.name)}">${esc(u.name.charAt(0).toUpperCase())}</span>`).join('')}
      ${liveUsers.length > 3 ? `<span class="plus">+${liveUsers.length - 3}</span>` : ''}
      <span class="live-pill">${liveCount} en vivo</span>
    </span>
  ` : '';

  return `
    <section class="groups-wrap">
      <div class="groups-head">
        <span class="section-label">Compite con amigos</span>
        <div class="actions">
          <button class="g-tab-btn" onclick="openJoinGroup()">Unirse</button>
          <button class="g-tab-btn primary" onclick="openCreateGroup()">+ Crear</button>
        </div>
      </div>
      ${switcher}
      <div class="group-card">
        <div class="gc-head">
          <div class="gc-title-wrap">
            <div class="gc-name">${esc(g.name)}</div>
            <div class="gc-meta">
              <span>${members.length} ${members.length === 1 ? 'miembro' : 'miembros'}</span>
              ${liveNamesHtml}
            </div>
          </div>
          <button class="gc-code" onclick="copyCode('${g.code}')" title="Copiar código">
            ${g.code}
            <svg class="copy-ico" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="7" height="7" rx="1"/><path d="M2 8V2h6"/></svg>
          </button>
        </div>

        <div class="period-tabs">
          <button class="period-tab${groupPeriod==='today'?' active':''}" onclick="setGroupPeriod('today')">Hoy</button>
          <button class="period-tab${groupPeriod==='week'?' active':''}" onclick="setGroupPeriod('week')">Semana</button>
          <button class="period-tab${groupPeriod==='total'?' active':''}" onclick="setGroupPeriod('total')">Total</button>
        </div>

        ${taunt}
        ${podiumHtml}
        ${restHtml}

        <div style="margin-top:14px; display:flex; justify-content:flex-end;">
          <button class="g-tab-btn" style="color:var(--t3);" onclick="leaveGroup('${g.id}','${esc(g.name).replace(/'/g,"\\'")}')">Salir del grupo</button>
        </div>
      </div>
    </section>
  `;
}

// VALID_EMOJIS in server.js: ['🔥','💀','😤','👑']
const REACTIONS = ['🔥','😤','👑','💀'];

// Received-reactions summary chips (podium pods) — shows only emojis with count > 0
function buildPodRx(m) {
  const rx = m.reactions || {};
  const active = REACTIONS.filter(e => (rx[e]?.count || 0) > 0);
  if (active.length === 0) return '<div class="pod-rx"></div>';
  return `
    <div class="pod-rx">
      ${active.map(e => {
        const r = rx[e];
        return `<span class="rx-chip${r.iMine ? ' mine' : ''}">${e}<span class="cnt">${r.count}</span></span>`;
      }).join('')}
    </div>
  `;
}

// Inline reaction strip on rank-row
function buildRxInline(gid, m) {
  const rx = m.reactions || {};
  return `
    <div class="rx-inline" onclick="event.stopPropagation()">
      ${REACTIONS.map(e => {
        const r = rx[e] || { count: 0, iMine: false };
        const empty = r.count === 0;
        return `<button class="rx-btn${r.iMine ? ' mine' : ''}${empty ? ' empty' : ''}" onclick="sendReaction('${gid}','${m.id}','${e}')">
          <span class="emoji">${e}</span>${r.count > 0 ? `<span class="cnt">${r.count}</span>` : ''}
        </button>`;
      }).join('')}
    </div>
  `;
}

function switchGroup(id) {
  activeGroupId = id;
  if (!boards[id]) loadBoard(id).then(() => render());
  else render();
}
function setGroupPeriod(p) { groupPeriod = p; render(); }

function copyCode(code) {
  navigator.clipboard?.writeText(code)
    .then(() => toast(`Código ${code} copiado`))
    .catch(() => toast(`Código: ${code}`));
}

async function sendReaction(gid, mid, emoji) {
  try {
    const res = await apiFetch(`/api/groups/${gid}/reactions`, {
      method: 'POST',
      body: JSON.stringify({ toUserId: mid, emoji })
    });
    if (!res.ok) return;
    await loadBoard(gid);
    render();
  } catch {}
}

function openReactSheet(gid, mid) {
  const lb = boards[gid];
  const m = lb?.board.find(x => x.id === mid);
  if (!m) return;
  const rx = m.reactions || {};
  const name = m.username || '';
  showSheet(`
    <div class="sheet-grip"></div>
    <h2 class="sheet-title">Reaccionar a <span class="serif">${esc(name)}</span></h2>
    <div class="react-sheet-row" id="J_reactSheetRow">
      ${REACTIONS.map(e => {
        const r = rx[e] || { count: 0, iMine: false };
        return `<button class="react-big${r.iMine ? ' mine' : ''}" data-emoji="${e}" onclick="sendReactionSheet('${gid}','${mid}','${e}')">
          <span>${e}</span>
          ${r.count > 0 ? `<span class="cnt">${r.count}</span>` : '<span class="cnt"> </span>'}
        </button>`;
      }).join('')}
    </div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:16px;line-height:1.5;">
      Toca una reacción para darla o quitarla. Se reinicia cada semana.
    </div>
    <div class="sheet-acts">
      <button class="s-btn primary" onclick="hideSheet()">Cerrar</button>
    </div>
  `);
}

async function sendReactionSheet(gid, mid, emoji) {
  await sendReaction(gid, mid, emoji);
  // Re-open the sheet with refreshed counts
  openReactSheet(gid, mid);
}

  showSheet(`

    <h2 class="sheet-title">Nuevo <span class="serif">grupo</span></h2>
    <div class="field-lbl">Nombre del grupo</div>

    <div style="font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:20px;">
      Se generará un código de invitación para que tus amigos se unan.
    </div>
    <div class="sheet-acts">
      <button class="s-btn ghost" onclick="hideSheet()">Cancelar</button>
      <button class="s-btn primary" id="sh-gbtn" onclick="doCreateGroup()">Crear</button>
    </div>
  `);
  setTimeout(() => document.getElementById('sh-gname').focus(), 300);
}

async function doCreateGroup() {
  const name = document.getElementById('sh-gname').value.trim();
  if (!name) return;
  const btn = document.getElementById('sh-gbtn');
  btn.disabled = true;
  try {
    const res = await apiFetch('/api/groups', { method: 'POST', body: JSON.stringify({ name }) });
    const json = await res.json();
    if (!res.ok) { toast(json.error || 'Error'); btn.disabled = false; return; }
    await loadGroups();
    activeGroupId = json.id;
    await loadBoard(json.id);
    hideSheet();
    render();
    toast(`Grupo creado · ${json.code}`);
  } catch {
    toast('Error al crear el grupo');
    btn.disabled = false;
  }
}

function openJoinGroup() {
  showSheet(`
    <div class="sheet-grip"></div>
    <h2 class="sheet-title">Unirse a un <span class="serif">grupo</span></h2>
    <div class="field-lbl">Código de invitación</div>
    <input type="text" class="text-input" id="sh-gcode" placeholder="Ej. XK7P2M" maxlength="8" autocomplete="off" style="letter-spacing:0.3em; font-family:'JetBrains Mono', monospace; text-transform:uppercase;">
    <div style="font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:20px;">

    </div>
    <div class="sheet-acts">
      <button class="s-btn ghost" onclick="hideSheet()">Cancelar</button>
      <button class="s-btn primary" id="sh-jbtn" onclick="doJoinGroup()">Unirse</button>
    </div>
  `);
  setTimeout(() => document.getElementById('sh-gcode').focus(), 300);
}

async function doJoinGroup() {
  const code = document.getElementById('sh-gcode').value.trim().toUpperCase();
  if (!code) return;
  const btn = document.getElementById('sh-jbtn');
  btn.disabled = true;
  try {
    const res = await apiFetch('/api/groups/join', { method: 'POST', body: JSON.stringify({ code }) });
    const json = await res.json();
    if (!res.ok) { toast(json.error || 'Error'); btn.disabled = false; return; }
    await loadGroups();
    activeGroupId = json.id;
    await loadBoard(json.id);
    hideSheet();
    render();
    toast(`Te uniste a ${json.name}`);
  } catch {
    toast('Error al unirse');
    btn.disabled = false;
  }
}

async function leaveGroup(gid, name) {
  if (!confirm(`¿Salir del grupo "${name}"?`)) return;
  try {
    const res = await apiFetch(`/api/groups/${gid}/leave`, { method: 'DELETE' });
    if (!res.ok) { toast('Error'); return; }
    delete boards[gid];
    await loadGroups();
    render();
    toast('Saliste del grupo');
  } catch {}
}

function buildStage() {
  const running = timer.running;
  const armed = !running && timer.elapsed > 0;
  const idle = !running && timer.elapsed === 0;
  const sub = data.subjects.find(s => s.id === (timer.subjectId || selectedSubject));
  const subColor = sub?.color || '#e8b04a';
  const subName = sub?.name || (data.subjects.length ? 'Elige una asignatura' : 'Crea una asignatura');

  const stageClass = running ? 'running' : (armed ? 'armed' : 'idle');

  const ms = currentElapsedMs();
  const totalSec = Math.floor(ms / 1000);
  const hours = Math.floor(totalSec / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  const secs = totalSec % 60;
  const pad = (n) => String(n).padStart(2, '0');

  let clockHtml;
  if (hours > 0) {
    clockHtml = `<span>${pad(hours)}</span><span class="sep">:</span><span>${pad(mins)}</span>` +
      (tweaks.showSeconds ? `<span class="sec">${pad(secs)}</span>` : '');
  } else {
    clockHtml = `<span>${pad(mins)}</span><span class="sep">:</span><span>${pad(secs)}</span>`;
  }

  // Buttons
  let controls;
  if (armed) {
    // Session paused — offer Discard / Resume / Save
    const h = ms / 1000 / 3600;
    const secs = Math.floor(ms / 1000);
    const saveLabel = secs < 60 ? `Guardar ${secs}s` : `Guardar ${fmtStr(h)}`;
    controls = `
      <button class="big-btn ghost" onclick="resetTimer()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="2" x2="11" y2="11"/><line x1="11" y1="2" x2="2" y2="11"/></svg>
        Descartar
      </button>
      <button class="big-btn" onclick="resumeTimer()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M3 2.5l8 4-8 4V2.5z"/></svg>
        Reanudar
      </button>
      <button class="big-btn accent" onclick="commitSession()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l3.5 3.5L11 3"/></svg>
        ${saveLabel}
      </button>
    `;
  } else if (running) {
    controls = `
      <button class="big-btn ghost" onclick="pauseTimer()">
        <svg width="13" height="14" viewBox="0 0 13 14" fill="currentColor"><rect x="1" y="1" width="4" height="12" rx="1"/><rect x="8" y="1" width="4" height="12" rx="1"/></svg>
        Pausar
      </button>
      <button class="big-btn" onclick="stopAndCommit()">
        <span class="stop-ico"></span>
        Parar
      </button>
    `;
  } else {
    controls = `
      <button class="big-btn" onclick="startTimer()" ${!selectedSubject ? 'disabled' : ''}>
        <span class="play-ico"></span>
        Empezar
      </button>
    `;
  }

  const subLabel = running ? 'Sesión en curso' : (armed ? 'Sesión pausada' : (selectedSubject ? 'Listo para empezar' : 'Sin asignatura'));

  return `
    <section class="stage ${stageClass}" style="--_sub-color:${subColor}">
      <span class="pulse"></span>
      <span class="pulse p2"></span>
      <div class="watermark">
        <span class="dot"></span>
        <span>${esc(subName)}</span>
      </div>
      <div class="clock-wrap">
        <div class="clock serif">${clockHtml}</div>
        <div class="clock-sub"><span class="live"></span>${subLabel}</div>
      </div>
      <div class="stage-controls${armed ? ' paused' : ''}">${controls}</div>
    </section>
  `;
}

function buildStats() {
  const tod = daySum(today());
  const yest = daySum(dk(new Date(Date.now() - 86400000)));
  const wk = weekSum(0);
  const streak = calcStreak();

  const delta = yest > 0 ? Math.round((tod - yest) / yest * 100) : null;
  const deltaCls = delta > 0 ? 'up' : (delta < 0 ? 'down' : '');
  const deltaTxt = delta === null
    ? (tod > 0 ? 'Primer día' : '—')
    : `${delta >= 0 ? '+' : ''}${delta}% vs ayer`;

  const fHoy = fmt(tod);
  const fWk = fmt(wk);

  return `
    <section class="stats">
      <div class="stat">
        <div class="lbl">Hoy</div>
        <div class="val serif">${fHoy.n}<span class="unit">${fHoy.unit}</span></div>
        <div class="meta"><span class="delta ${deltaCls}">${deltaTxt}</span></div>
      </div>
      <div class="stat">
        <div class="lbl">Semana</div>
        <div class="val serif">${fWk.n}<span class="unit">${fWk.unit}</span></div>
        <div class="meta">${data.subjects.length} asignaturas</div>
      </div>
      <div class="stat streak">
        <div class="lbl">Racha</div>
        <div class="val serif">${streak}<span class="unit">${streak === 1 ? 'día' : 'días'}</span></div>
        <div class="meta">${streak > 0 ? '<span class="flame">✦</span> activa' : 'empieza hoy'}</div>
      </div>
    </section>
  `;
}

function buildGoal() {
  const goal = settings.dailyGoal || 0;
  if (goal <= 0) {
    return `
      <section class="goal-card empty" onclick="openGoal()">
        <div class="gl-lbl">Meta diaria</div>
        <div class="gl-prompt">Define tu objetivo y síguelo a diario →</div>
      </section>
    `;
  }
  const tod = daySum(today());
  const pct = Math.min(100, Math.round(tod / goal * 100));
  const achieved = tod >= goal;
  const remaining = Math.max(0, goal - tod);
  const fTod = fmt(tod);
  const fGoal = fmt(goal);
  const foot = achieved
    ? '✦ Meta alcanzada · sigue sumando'
    : tod === 0
      ? `Faltan ${fmtStr(remaining)} · empieza el cronómetro`
      : `Faltan ${fmtStr(remaining)} para llegar`;
  return `
    <section class="goal-card${achieved ? ' done' : ''}" onclick="openGoal()">
      <div class="gl-head">
        <span class="gl-lbl">Meta diaria</span>
        <span class="gl-pct">${pct}%</span>
      </div>
      <div class="gl-nums">
        <span class="gl-cur serif">${fTod.n}<span class="u">${fTod.unit}</span></span>
        <span class="gl-sep">/</span>
        <span class="gl-goal">${fGoal.n}${fGoal.unit}</span>
      </div>
      <div class="gl-bar"><div class="gl-fill" style="width:${pct}%"></div></div>
      <div class="gl-foot">${foot}</div>
    </section>
  `;
}

function buildWeek() {
  const days = weekOf(weekOffset);
  const LBL = ['L','M','X','J','V','S','D'];
  const vals = days.map(d => daySum(dk(d)));
  const mx = Math.max(...vals, 0.5);
  const M = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const range = `${days[0].getDate()} – ${days[6].getDate()} ${M[days[6].getMonth()]}`;
  const tok = today();

  const bars = days.map((d, i) => {
    const v = vals[i];
    const h = v === 0 ? 0 : Math.max(v / mx * 100, 8);
    const isT = dk(d) === tok;
    return `
      <div class="wb-col">
        <div class="wb-bar-wrap">
          <div class="wb-bar${v > 0 ? ' has-data' : ''}${isT ? ' today' : ''}" style="height:${h}%">
            ${v > 0 ? `<span class="tip">${fmtStr(v)}</span>` : ''}
          </div>
        </div>
        <span class="wb-lbl${isT ? ' today' : ''}">${LBL[i]}</span>
      </div>
    `;
  }).join('');

  return `
    <section class="week-card">
      <div class="week-head">
        <span class="section-label">La semana</span>
        <div class="week-nav">
          <button class="nav-btn" onclick="shiftWeek(-1)">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6.5 1.5L3 5l3.5 3.5"/></svg>
          </button>
          <span class="week-range">${range}</span>
          <button class="nav-btn" onclick="shiftWeek(1)" ${weekOffset === 0 ? 'disabled' : ''}>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3.5 1.5L7 5l-3.5 3.5"/></svg>
          </button>
        </div>
      </div>
      <div class="week-bars">${bars}</div>
    </section>
  `;
}
