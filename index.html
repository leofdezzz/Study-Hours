<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Hours</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0c0c0c;
      --s1:       #141414;
      --s2:       #1c1c1c;
      --s3:       #252525;
      --border:   #2a2a2a;
      --text:     #ffffff;
      --t2:       #999999;
      --t3:       #4a4a4a;
      --green:    #86efac;
      --red:      #fca5a5;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { display: none; }

    /* ─── Layout ─── */
    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 0 18px;
    }

    /* ─── Header ─── */
    .hdr {
      padding: 52px 18px 28px;
      max-width: 460px;
      margin: 0 auto;
    }
    .hdr-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 5px;
    }
    .hdr-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1.2px;
    }
    .hdr-date {
      font-size: 13px;
      color: var(--t2);
      margin-top: 5px;
    }

    /* ─── Stats Row ─── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px 16px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,.025) 0%, transparent 55%);
      pointer-events: none;
    }
    .stat-lbl {
      font-size: 10px;
      font-weight: 600;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .stat-val {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 9px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: .2px;
    }
    .badge.pos  { color: var(--green); background: rgba(134,239,172,.1); }
    .badge.neg  { color: var(--red);   background: rgba(252,165,165,.1); }
    .badge.neu  { color: var(--t3);    background: var(--s2); }

    /* ─── Chart ─── */
    .chart-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 18px 18px;
      margin-bottom: 12px;
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .card-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card-sub {
      font-size: 12px;
      color: var(--t3);
    }
    .chart-area {
      height: 90px;
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      gap: 7px;
    }
    .bar {
      width: 100%;
      border-radius: 5px 5px 3px 3px;
      background: var(--s3);
      transition: height .65s cubic-bezier(.34,1.4,.64,1);
      position: relative;
    }
    .bar.active {
      background: #fff;
      box-shadow: 0 0 14px rgba(255,255,255,.2);
    }
    .bar-lbl {
      font-size: 10px;
      font-weight: 500;
      color: var(--t3);
      transition: color .2s;
    }
    .bar-lbl.active { color: var(--text); }

    /* ─── Subjects ─── */
    .sec-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -.2px;
      transition: opacity .15s, transform .1s;
    }
    .add-btn:active { transform: scale(.95); }

    .subjects { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

    .sc {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 15px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s;
      position: relative;
      overflow: hidden;
      animation: si .35s cubic-bezier(.34,1.4,.64,1) both;
    }
    .sc:hover { border-color: #383838; }

    @keyframes si {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sc-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--t3);
      flex-shrink: 0;
    }
    .sc-info { flex: 1; min-width: 0; }
    .sc-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sc-week {
      font-size: 11px;
      color: var(--t3);
      margin-top: 2px;
    }
    .sc-today {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -1.5px;
      min-width: 54px;
      text-align: center;
    }
    .sc-today.pop {
      animation: pop .3s cubic-bezier(.34,1.9,.64,1);
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.28); }
      100% { transform: scale(1); }
    }

    .sc-ctrl { display: flex; gap: 6px; }
    .hbtn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      font-weight: 200;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, transform .1s;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .hbtn:hover { background: var(--s3); }
    .hbtn:active { transform: scale(.87); }

    .sc-edit {
      opacity: 0;
      width: 28px; height: 28px;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: var(--t3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .2s, color .15s;
      flex-shrink: 0;
    }
    .sc:hover .sc-edit { opacity: 1; }
    .sc-edit:hover { color: var(--t2); }

    /* Floating +/- label */
    .float-lbl {
      position: absolute;
      right: 58px;
      font-size: 13px;
      font-weight: 700;
      pointer-events: none;
      opacity: 0;
      transform: translateY(0);
      animation: floatUp .7s cubic-bezier(.25,.46,.45,.94) forwards;
    }
    .float-lbl.pos { color: var(--green); }
    .float-lbl.neg { color: var(--red); }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0px); }
      70%  { opacity: .7; }
      100% { opacity: 0; transform: translateY(-28px); }
    }

    /* ─── Total ─── */
    .total-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .total-info .lbl  { font-size: 13px; font-weight: 500; color: var(--t2); }
    .total-info .sub  { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .total-val {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -2.5px;
    }

    /* ─── Empty ─── */
    .empty {
      text-align: center;
      padding: 36px 16px;
    }
    .empty-icon {
      font-size: 30px;
      opacity: .25;
      margin-bottom: 10px;
    }
    .empty-txt {
      font-size: 13px;
      color: var(--t3);
      line-height: 1.6;
    }

    /* ─── Modal / Sheet ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      display: flex;
      align-items: flex-end;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      background: var(--s1);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 24px 24px 0 0;
      padding: 12px 22px 52px;
      transform: translateY(105%);
      transition: transform .42s cubic-bezier(.34,1.1,.64,1);
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--s3);
      border-radius: 2px;
      margin: 8px auto 26px;
    }
    .sheet-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.6px;
      margin-bottom: 20px;
    }
    .txt-input {
      width: 100%;
      background: var(--s2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      outline: none;
      transition: border-color .2s;
      letter-spacing: -.2px;
      margin-bottom: 16px;
    }
    .txt-input::placeholder { color: var(--t3); }
    .txt-input:focus { border-color: #555; }

    .sheet-acts { display: flex; gap: 10px; }
    .sbtn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid transparent;
      letter-spacing: -.3px;
      transition: opacity .15s, transform .1s;
    }
    .sbtn:active { transform: scale(.97); }
    .sbtn.primary { background: #fff; color: #000; }
    .sbtn.secondary { background: transparent; color: var(--t2); border-color: var(--border); }
    .sbtn.danger { background: transparent; color: var(--red); border-color: rgba(252,165,165,.2); }

    /* ─── Ripple ─── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      transform: scale(0);
      animation: rpl .5s linear forwards;
      pointer-events: none;
    }
    @keyframes rpl { to { transform: scale(5); opacity: 0; } }

    /* ─── Responsive ─── */
    @media (max-width: 380px) {
      .hdr { padding: 36px 16px 22px; }
      .wrap { padding: 0 14px; }
      .hdr-title { font-size: 26px; }
      .stat-val { font-size: 26px; }
      .total-val { font-size: 32px; }
      .sc-today { font-size: 20px; min-width: 46px; }
      .sc-name { font-size: 14px; }
      .hbtn { width: 30px; height: 30px; font-size: 16px; }
      .stat-card { padding: 14px 12px; }
      .sc { padding: 13px 13px; gap: 9px; }
      .chart-area { height: 75px; }
    }

    @media (max-width: 320px) {
      .stats-row { grid-template-columns: 1fr; }
      .sc-today { display: none; }
    }

    @media (min-width: 600px) {
      .hdr { padding: 60px 0 28px; max-width: 460px; margin: 0 auto; }
      body { padding-bottom: 80px; }
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #fff;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 100px;
      opacity: 0;
      transition: transform .3s cubic-bezier(.34,1.4,.64,1), opacity .3s;
      z-index: 300;
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: -.2px;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-sub">Seguimiento</div>
  <div class="hdr-title">Study Hours</div>
  <div class="hdr-date" id="J_date"></div>
</div>

<div class="wrap">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-lbl">Hoy</div>
      <div class="stat-val" id="J_todayVal">0h</div>
      <div class="badge neu" id="J_todayBadge">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Esta semana</div>
      <div class="stat-val" id="J_weekVal">0h</div>
      <div class="badge neu" id="J_weekBadge">—</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="card-head">
      <span class="card-title">Semana actual</span>
      <span class="card-sub" id="J_weekRange"></span>
    </div>
    <div class="chart-area" id="J_chart"></div>
  </div>

  <!-- Subjects -->
  <div class="sec-head">
    <span class="card-title">Asignaturas</span>
    <button class="add-btn" id="J_addBtn">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Añadir
    </button>
  </div>
  <div class="subjects" id="J_subjects"></div>

  <!-- Total -->
  <div class="total-card">
    <div class="total-info">
      <div class="lbl">Total acumulado</div>
      <div class="sub">todas las asignaturas · siempre</div>
    </div>
    <div class="total-val" id="J_total">0h</div>
  </div>

</div>

<!-- Modal Sheet -->
<div class="overlay" id="J_overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="J_sheetTitle">Nueva asignatura</div>
    <input type="text" class="txt-input" id="J_input" placeholder="Nombre de la asignatura" maxlength="40" autocomplete="off" spellcheck="false">
    <div class="sheet-acts" id="J_sheetActs"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="J_toast"></div>

<script>
/* ═══════════════════════════════════
   Data layer
═══════════════════════════════════ */
const KEY = 'sh_v2';
function loadData() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {subjects:[],logs:{}}; }
  catch { return {subjects:[],logs:{}}; }
}
function persist() { localStorage.setItem(KEY, JSON.stringify(data)); }
let data = loadData();
let editId = null;

/* ═══════════════════════════════════
   Date helpers
═══════════════════════════════════ */
function dk(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function today() { return dk(new Date()); }
function weekOf(offset=0) {
  const t = new Date(), dow = (t.getDay()+6)%7;
  const mon = new Date(t);
  mon.setDate(t.getDate() - dow + offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function daySum(key) {
  const d = data.logs[key];
  return d ? Object.values(d).reduce((s,v)=>s+v,0) : 0;
}
function weekSum(off=0) { return weekOf(off).reduce((s,d)=>s+daySum(dk(d)),0); }
function subDay(sid)  { return (data.logs[today()]||{})[sid]||0; }
function subWeek(sid) { return weekOf().reduce((s,d)=>s+((data.logs[dk(d)]||{})[sid]||0),0); }
function subAll(sid)  { return Object.values(data.logs).reduce((s,d)=>s+(d[sid]||0),0); }
function grandTotal() { return data.subjects.reduce((s,sub)=>s+subAll(sub.id),0); }

/* ═══════════════════════════════════
   Hour management
═══════════════════════════════════ */
function adjust(sid, delta) {
  const k = today();
  if (!data.logs[k]) data.logs[k] = {};
  const next = Math.max(0, +((data.logs[k][sid]||0) + delta).toFixed(2));
  if (next === 0) delete data.logs[k][sid];
  else data.logs[k][sid] = next;
  if (!Object.keys(data.logs[k]).length) delete data.logs[k];
  persist();
}

/* ═══════════════════════════════════
   Formatting
═══════════════════════════════════ */
function fmt(h) {
  if (h === 0) return '0h';
  const hr = Math.floor(h), mn = Math.round((h-hr)*60);
  if (hr === 0) return `${mn}m`;
  if (mn === 0) return `${hr}h`;
  return `${hr}h ${mn}m`;
}
function pct(now, prev) {
  if (now===0 && prev===0) return {txt:'Sin cambios', cls:'neu'};
  if (prev===0) return {txt:`+${fmt(now)} nuevo`, cls:'pos'};
  const p = Math.round((now-prev)/prev*100);
  return {txt:`${p>=0?'+':''}${p}%`, cls: p>0?'pos':p<0?'neg':'neu'};
}

/* ═══════════════════════════════════
   Render
═══════════════════════════════════ */
function render() {
  renderHeader();
  renderStats();
  renderChart();
  renderSubjects();
  renderTotal();
}

function renderHeader() {
  const D=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const M=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const n=new Date();
  document.getElementById('J_date').textContent=`${D[n.getDay()]}, ${n.getDate()} de ${M[n.getMonth()]}`;
}

function renderStats() {
  const tod = daySum(today());
  const yest = daySum(dk(new Date(Date.now()-86400000)));
  const wk = weekSum(0), lwk = weekSum(-1);

  document.getElementById('J_todayVal').textContent = fmt(tod);
  document.getElementById('J_weekVal').textContent  = fmt(wk);

  const tc = pct(tod, yest), wc = pct(wk, lwk);
  const tb = document.getElementById('J_todayBadge');
  tb.textContent = `${tc.txt} vs ayer`;
  tb.className = `badge ${tc.cls}`;

  const wb = document.getElementById('J_weekBadge');
  wb.textContent = `${wc.txt} vs sem. ant.`;
  wb.className = `badge ${wc.cls}`;

  const days = weekOf();
  const Sm=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  document.getElementById('J_weekRange').textContent =
    `${days[0].getDate()} – ${days[6].getDate()} ${Sm[days[6].getMonth()]}`;
}

function renderChart() {
  const cont = document.getElementById('J_chart');
  const LBL = ['L','M','X','J','V','S','D'];
  const days = weekOf();
  const tok  = today();
  const vals = days.map(d=>daySum(dk(d)));
  const mx   = Math.max(...vals, 0.5);

  cont.innerHTML='';
  days.forEach((d,i)=>{
    const isT = dk(d)===tok;
    const v   = vals[i];
    const hp  = v === 0 ? 0 : Math.max(v/mx*85, 5);

    const col = document.createElement('div');
    col.className = 'bar-col';

    const bar = document.createElement('div');
    bar.className = `bar${isT?' active':''}`;
    bar.style.height = '0%';
    if(v>0) bar.title = fmt(v);

    const lbl = document.createElement('div');
    lbl.className = `bar-lbl${isT?' active':''}`;
    lbl.textContent = LBL[i];

    col.appendChild(bar);
    col.appendChild(lbl);
    cont.appendChild(col);

    setTimeout(()=>{ bar.style.height=`${hp}%`; }, i*45);
  });
}

function renderSubjects() {
  const list = document.getElementById('J_subjects');

  if (!data.subjects.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">◻</div>
        <div class="empty-txt">Sin asignaturas todavía.<br>Pulsa "Añadir" para comenzar.</div>
      </div>`;
    return;
  }

  const emptyEl = list.querySelector('.empty');
  if (emptyEl) emptyEl.remove();

  const seen = new Set();
  data.subjects.forEach((sub, idx) => {
    seen.add(sub.id);
    const tod = subDay(sub.id);
    const wk  = subWeek(sub.id);
    let card  = list.querySelector(`[data-sid="${sub.id}"]`);

    if (card) {
      card.querySelector('.sc-name').textContent = sub.name;
      card.querySelector('.sc-week').textContent = `${fmt(wk)} esta semana`;
      const hEl = card.querySelector('.sc-today');
      if (hEl.textContent !== fmt(tod)) {
        hEl.textContent = fmt(tod);
        hEl.classList.remove('pop');
        void hEl.offsetWidth;
        hEl.classList.add('pop');
      }
    } else {
      card = document.createElement('div');
      card.className = 'sc';
      card.dataset.sid = sub.id;
      card.style.animationDelay = `${idx*50}ms`;
      card.innerHTML = `
        <div class="sc-dot"></div>
        <div class="sc-info">
          <div class="sc-name">${esc(sub.name)}</div>
          <div class="sc-week">${fmt(wk)} esta semana</div>
        </div>
        <div class="sc-today">${fmt(tod)}</div>
        <div class="sc-ctrl">
          <button class="hbtn" data-op="m" aria-label="Restar 1 hora">−</button>
          <button class="hbtn" data-op="p" aria-label="Sumar 1 hora">+</button>
        </div>
        <button class="sc-edit" aria-label="Editar asignatura">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1.5 10.5L9 3l2 2L3.5 12.5H1.5v-2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M8 4l2 2" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>`;

      card.querySelectorAll('.hbtn').forEach(btn => {
        btn.addEventListener('click', e => {
          const sid   = card.dataset.sid;
          const delta = btn.dataset.op === 'p' ? 1 : -1;
          const cur   = subDay(sid);
          if (delta === -1 && cur === 0) return;
          ripple(btn, e);
          floatLabel(card, delta);
          adjust(sid, delta);
          render();
        });
      });

      card.querySelector('.sc-edit').addEventListener('click', () => {
        const s = data.subjects.find(s=>s.id===sub.id);
        if (s) openEdit(s.id, s.name);
      });

      list.appendChild(card);
    }
  });

  // Remove orphaned cards
  list.querySelectorAll('[data-sid]').forEach(el => {
    if (!seen.has(el.dataset.sid)) el.remove();
  });
}

function renderTotal() {
  document.getElementById('J_total').textContent = fmt(grandTotal());
}

/* ═══════════════════════════════════
   UI helpers
═══════════════════════════════════ */
function esc(s) {
  const d=document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function ripple(el, e) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const rc = el.getBoundingClientRect();
  const sz = Math.max(rc.width, rc.height);
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px`;
  el.appendChild(r);
  r.addEventListener('animationend',()=>r.remove());
}

function floatLabel(card, delta) {
  const lbl = document.createElement('span');
  lbl.className = `float-lbl ${delta>0?'pos':'neg'}`;
  lbl.textContent = delta>0 ? '+1h' : '−1h';
  const ctrl = card.querySelector('.sc-ctrl');
  ctrl.style.position = 'relative';
  lbl.style.top = '-8px';
  ctrl.appendChild(lbl);
  lbl.addEventListener('animationend',()=>lbl.remove());
}

let toastT;
function toast(msg) {
  const el = document.getElementById('J_toast');
  clearTimeout(toastT);
  el.textContent = msg;
  el.classList.add('show');
  toastT = setTimeout(()=>el.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════
   Sheet
═══════════════════════════════════ */
function openAdd() {
  editId = null;
  document.getElementById('J_sheetTitle').textContent = 'Nueva asignatura';
  document.getElementById('J_input').value = '';
  document.getElementById('J_sheetActs').innerHTML = `
    <button class="sbtn secondary" id="J_cancel">Cancelar</button>
    <button class="sbtn primary"   id="J_save">Guardar</button>`;
  bindSheet();
  showSheet();
}

function openEdit(id, name) {
  editId = id;
  document.getElementById('J_sheetTitle').textContent = 'Editar asignatura';
  document.getElementById('J_input').value = name;
  document.getElementById('J_sheetActs').innerHTML = `
    <button class="sbtn danger"    id="J_del">Eliminar</button>
    <button class="sbtn primary"   id="J_save">Guardar</button>`;
  bindSheet();
  showSheet();
}

function bindSheet() {
  const save = document.getElementById('J_save');
  const cancel = document.getElementById('J_cancel');
  const del  = document.getElementById('J_del');
  if(save)   save.addEventListener('click', doSave);
  if(cancel) cancel.addEventListener('click', hideSheet);
  if(del)    del.addEventListener('click', doDelete);
}

function doSave() {
  const name = document.getElementById('J_input').value.trim();
  if (!name) { document.getElementById('J_input').focus(); return; }
  if (editId) {
    const s = data.subjects.find(s=>s.id===editId);
    if (s) { s.name=name; persist(); }
  } else {
    data.subjects.push({id:`${Date.now()}`, name});
    persist();
  }
  hideSheet();
  render();
  toast(editId ? '✓ Asignatura actualizada' : '✓ Asignatura añadida');
}

function doDelete() {
  if (!confirm('¿Eliminar esta asignatura?\nSe perderán todos sus registros.')) return;
  data.subjects = data.subjects.filter(s=>s.id!==editId);
  Object.keys(data.logs).forEach(k=>{
    delete data.logs[k][editId];
    if(!Object.keys(data.logs[k]).length) delete data.logs[k];
  });
  persist();
  hideSheet();
  render();
  toast('Asignatura eliminada');
}

function showSheet() {
  document.getElementById('J_overlay').classList.add('open');
  setTimeout(()=>document.getElementById('J_input').focus(), 440);
}
function hideSheet() {
  document.getElementById('J_overlay').classList.remove('open');
}

/* ═══════════════════════════════════
   Events
═══════════════════════════════════ */
document.getElementById('J_addBtn').addEventListener('click', openAdd);
document.getElementById('J_overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('J_overlay')) hideSheet();
});
document.getElementById('J_input').addEventListener('keydown', e=>{
  if(e.key==='Enter') doSave();
  if(e.key==='Escape') hideSheet();
});

/* ═══════════════════════════════════
   Boot
═══════════════════════════════════ */
render();
</script>
