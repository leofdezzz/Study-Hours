<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#141414"/>
  <!-- Clock ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#ffffff" stroke-width="22"/>
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="256" y2="152" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="318" y2="296" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="#ffffff"/>
  <!-- Tick marks -->
  <line x1="256" y1="113" x2="256" y2="128" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="384" x2="256" y2="399" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <line x1="113" y1="256" x2="128" y2="256" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <line x1="384" y1="256" x2="399" y2="256" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
</svg>
